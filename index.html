<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SD Math Plotter</title>
<style>
  :root{ --ground:#20242b; --ink:#ddd3c2; --rule:#5a5244; --red:#d0603e;
    --blue:#7f97d2; --panel:#2b303a; --panel-edge:#454c59; --stage:#272b33; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--ground);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    -webkit-user-select:none;user-select:none;}
  .wrap{max-width:560px;margin:0 auto;padding:14px 14px 44px;}
  header{display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:4px 14px;
    border-bottom:1.5px solid var(--ink);padding-bottom:6px;margin-bottom:4px;}
  header .ttl{font-size:18px;letter-spacing:.05em;font-variant:small-caps;}
  header .pl{font-size:11px;letter-spacing:.16em;color:var(--red);font-variant:small-caps;}
  .menus{display:flex;gap:8px;align-items:baseline;}
  .menu{position:relative;}
  .menus button{font-family:inherit;font-size:12px;letter-spacing:.06em;
    font-variant:small-caps;color:var(--ink);background:none;border:none;
    padding:4px 6px;cursor:pointer;}
  .menus button:active{color:var(--red);}
  .drop{position:absolute;left:0;top:100%;display:none;z-index:8;
    background:var(--panel);border:2px solid var(--ink);border-radius:4px;
    padding:4px;min-width:170px;max-height:70vh;overflow:auto;}
  .drop button{display:block;width:100%;text-align:left;border:none;
    background:none;border-radius:2px;padding:6px 9px;font-size:12px;
    font-variant:normal;letter-spacing:.02em;color:var(--ink);}
  .drop button:active{background:var(--panel-edge);}
  .drop .h{font-size:10px;letter-spacing:.16em;color:var(--red);
    font-variant:small-caps;padding:7px 9px 3px;border-bottom:1px solid var(--panel-edge);
    margin-bottom:2px;}
  .sub{font-size:11px;letter-spacing:.04em;color:var(--rule);margin:4px 0 10px;min-height:15px;}
  .panes{display:grid;grid-template-columns:1fr;gap:0 16px;}
  .stage{position:relative;width:100%;border:6px solid var(--panel-edge);
    background:var(--stage);overflow:hidden;}
  #graphStage{aspect-ratio:10/7;}
  #plotStage{aspect-ratio:10/6;margin-top:12px;}
  #mapStage{aspect-ratio:10/6;margin-top:10px;}
  #stripStage{margin-top:10px;height:96px;}
  .trainmode #plotStage{aspect-ratio:16/8;}
  .trainmode #mapStage{aspect-ratio:16/8;}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  .bar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 0;}
  button{font-family:inherit;font-size:12px;letter-spacing:.06em;
    font-variant:small-caps;color:var(--ink);background:var(--panel);
    border:1.5px solid var(--panel-edge);border-radius:3px;padding:7px 11px;
    cursor:pointer;}
  button:active{background:var(--panel-edge);}
  button.warm{color:var(--red);border-color:var(--red);}
  button.on{background:var(--red);color:var(--stage);border-color:var(--red);}
  #inspector{display:none;margin-top:10px;background:var(--panel);
    border:1.5px solid var(--panel-edge);border-radius:3px;padding:9px 11px;}
  #inspector .row{display:flex;align-items:center;gap:10px;}
  #inspector .name{font-size:12px;font-variant:small-caps;letter-spacing:.08em;min-width:70px;}
  #inspector input[type=range]{flex:1;accent-color:var(--red);}
  #inspector input[type=number],#inspector input[type=text]{
    font-size:12px;font-family:"SF Mono",Menlo,Consolas,monospace;color:var(--ink);
    background:var(--stage);border:1.5px solid var(--panel-edge);border-radius:3px;
    padding:4px 6px;-webkit-user-select:text;user-select:text;}
  #inspector input[type=number]{width:88px;text-align:right;}
  #inspector input[type=text]{flex:1;}
  #inspector textarea{flex:1;font-size:12px;line-height:1.35;
    font-family:inherit;color:var(--ink);background:var(--stage);
    border:1.5px solid var(--panel-edge);border-radius:3px;padding:6px 8px;
    resize:vertical;min-height:56px;-webkit-user-select:text;user-select:text;}
  .dom{display:none;align-items:center;gap:6px;margin:8px 2px 0;
    font-size:11px;letter-spacing:.08em;font-variant:small-caps;color:var(--rule);}
  .dom input{width:74px;font-size:12px;text-align:right;
    font-family:"SF Mono",Menlo,Consolas,monospace;color:var(--ink);
    background:var(--stage);border:1.5px solid var(--panel-edge);border-radius:3px;
    padding:4px 6px;-webkit-user-select:text;user-select:text;}
  .dom input[type=range]{width:150px;padding:0;border:none;background:none;
    accent-color:var(--red);}
  .dom span{min-width:86px;}
  #expr{font-size:12px;margin:8px 2px 0;color:var(--blue);min-height:16px;
    font-family:"SF Mono",Menlo,Consolas,monospace;word-break:break-all;}
  #expr .who{color:var(--rule);font-family:inherit;font-variant:small-caps;
    letter-spacing:.08em;font-size:10.5px;}
  #menu{position:absolute;inset:0;background:rgba(0,0,0,.35);display:none;
    align-items:flex-start;justify-content:center;padding:16px;z-index:5;}
  #menu .card{background:var(--panel);border:2px solid var(--ink);border-radius:4px;
    padding:10px 12px 12px;max-width:92%;max-height:92%;overflow:auto;}
  #menu h3{margin:8px 0 4px;font-size:11px;letter-spacing:.16em;color:var(--red);
    font-variant:small-caps;font-weight:normal;border-bottom:1px solid var(--panel-edge);}
  #menu .grid{display:flex;flex-wrap:wrap;gap:5px;}
  #menu .grid button{padding:6px 9px;font-size:12px;background:var(--stage);}
  #ctx{position:absolute;display:none;z-index:6;background:var(--panel);
    border:2px solid var(--ink);border-radius:4px;min-width:132px;max-height:82%;
    overflow:auto;padding:4px;}
  #ctx button{display:block;width:100%;text-align:left;border:none;background:none;
    border-radius:2px;padding:6px 9px;font-size:12px;}
  #ctx button:active{background:var(--panel-edge);}
  #ctx button.cat{color:var(--red);}
  #ctx button.back{color:var(--rule);border-bottom:1px solid var(--panel-edge);
    border-radius:0;margin-bottom:2px;}
  #finder{position:absolute;display:none;z-index:6;left:50%;top:12px;
    transform:translateX(-50%);width:min(320px,88%);background:var(--panel);
    border:2px solid var(--ink);border-radius:4px;padding:8px;}
  #finder input{width:100%;font-family:"SF Mono",Menlo,Consolas,monospace;
    font-size:13px;padding:6px 8px;border:1.5px solid var(--panel-edge);
    border-radius:3px;background:var(--stage);color:var(--ink);
    -webkit-user-select:text;user-select:text;}
  #finderList{margin-top:6px;max-height:180px;overflow:auto;
    display:flex;flex-direction:column;gap:2px;}
  #finderList button{text-align:left;display:flex;justify-content:space-between;
    align-items:baseline;border:none;background:none;border-radius:2px;
    padding:5px 8px;font-size:12px;}
  #finderList button:active,#finderList button.hot{background:var(--panel-edge);}
  #finderList .c{color:var(--rule);font-size:10px;letter-spacing:.08em;font-variant:small-caps;}
  #saveOv{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;
    flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:18px;}
  #saveOv img{max-width:94%;max-height:76%;border:4px solid var(--ink);}
  #saveOv p{color:var(--ink);font-size:13px;letter-spacing:.06em;text-align:center;}
  #saveOv button{margin-top:6px;}
  @media (min-width:900px){
    .wrap{max-width:1240px;}
    .panes{grid-template-columns:1.05fr 1fr;align-items:start;}
    #graphStage{aspect-ratio:4/3;}
    #plotStage{aspect-ratio:4/3;margin-top:0;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ttl">SD Math Plotter</div>
    <nav class="menus">
      <div class="menu"><button id="mFile">file ▾</button>
        <div class="drop" id="dFile">
          <button data-act="new">new graph</button>
          <button data-act="open">open graph…</button>
          <button data-act="save">save graph</button>
        </div></div>
      <div class="menu"><button id="mMode">mode ▾</button>
        <div class="drop" id="dMode">
          <button data-mode="1d">1d explicit</button>
          <button data-mode="par">parametric 2d</button>
          <button data-mode="la">linear algebra 2d</button>
          <button data-mode="train">train</button>
        </div></div>
      <div class="menu"><button id="mEx">examples ▾</button>
        <div class="drop" id="dEx"></div></div>
      <button id="themeBtn">◐ theme</button>
    </nav>
    <div class="pl">v0.14</div>
  </header>
  <div class="sub" id="subLine">every wire carries y(x) · flow nodes re-parameterize · tap a node for its curve &amp; recipe</div>

  <div class="panes">
    <div>
      <div class="stage" id="graphStage">
        <canvas id="gc"></canvas>
        <div id="menu"><div class="card" id="menuCard"></div></div>
        <div id="ctx"></div>
        <div id="finder"><input id="finderIn" placeholder="search nodes… (enter places top match)">
          <div id="finderList"></div></div>
      </div>
      <div class="bar">
        <button id="addBtn" class="warm">＋ add node</button>
        <button id="undoBtn">↶ undo</button>
        <button id="redoBtn">↷ redo</button>
        <button id="copyBtn">⎘ copy</button>
        <button id="pasteBtn">⎗ paste</button>
        <button id="delBtn">delete</button>
        <button id="playBtn">▷ play τ</button>
        <button id="stepBtn" style="display:none">⟳ step</button>
        <button id="resetBtn" style="display:none">↺ reset</button>
        <button id="landBtn" style="display:none">⛰ landscape</button>
        <button id="glowBtn" style="display:none">⚡ grad</button>
        <button id="saveBtn">save png</button>
      </div>
      <div id="inspector"></div>
    </div>
    <div>
      <div class="stage" id="plotStage"><canvas id="pc"></canvas></div>
      <div class="stage" id="mapStage" style="display:none"><canvas id="mc"></canvas></div>
      <div class="stage" id="stripStage" style="display:none"><canvas id="lc"></canvas></div>
      <div class="dom" id="domRow">t ∈ [
        <input id="t0" inputmode="decimal" step="any" type="number">
        ,
        <input id="t1" inputmode="decimal" step="any" type="number">
        ]</div>
      <div class="dom" id="spdRow">speed
        <input type="range" id="spd" min="0" max="1" step="0.005" value="0.747">
        <span id="spdVal"></span></div>
      <div id="expr"></div>
    </div>
  </div>
</div>

<input type="file" id="fileIn" accept=".json,application/json" hidden>
<div id="saveOv"><img id="saveImg" alt=""><p>press &amp; hold the image → “Save Image”</p><button id="saveClose">close</button></div>

<script>
"use strict";
/* ---------------- themes ---------------- */
const THEMES = {
  ink: {
    css:{ground:"#20242b",ink:"#ddd3c2",rule:"#8d94a3",red:"#d0603e",
         blue:"#7f97d2",panel:"#2b303a","panel-edge":"#454c59",stage:"#272b33"},
    gridDot:"rgba(221,211,194,.10)",
    nodeFill:"#313743", nodeStroke:"#9aa2b1", nodeSel:"#d0603e",
    title:"#ddd3c2", flowTitle:"#92a8e0", divider:"#454c59",
    portEmpty:"#6b7383", portVal:"#ddd3c2", portFn:"#7f97d2", portOut:"#d0603e",
    wireVal:"#c8bfae", wireFn:"#7f97d2", wireDrag:"#d0603e",
    vec:"#7bbfa0", mat:"#b48ed8", data:"#c98f2f",
    plotBg:"#23272e", gridLine:"rgba(160,150,130,.20)", axis:"#c8bfae",
    tick:"#8d94a3", ghost:"#ddd3c2", label:"#8d94a3",
    frameEdge:"#566079", frameFill:"rgba(127,151,210,.07)", frameTitle:"#9fb0d8",
    comment:"#a9b2c2",
    plotCols:["#e06a45","#89a0e0","#79b98d","#d8ab55"],
  },
  plate: {
    css:{ground:"#e6d6b3",ink:"#22303f",rule:"#6b5d40",red:"#aa3a2c",
         blue:"#23396b",panel:"#ecdfc2","panel-edge":"#cdb78a",stage:"#f3e9d2"},
    gridDot:"rgba(34,48,63,.13)",
    nodeFill:"#ecdfc2", nodeStroke:"#22303f", nodeSel:"#aa3a2c",
    title:"#22303f", flowTitle:"#23396b", divider:"#cdb78a",
    portEmpty:"#b9a47a", portVal:"#22303f", portFn:"#23396b", portOut:"#aa3a2c",
    wireVal:"#22303f", wireFn:"#23396b", wireDrag:"#aa3a2c",
    vec:"#3f6d4e", mat:"#5c3d78", data:"#8a6a1a",
    plotBg:"#f3e9d2", gridLine:"rgba(185,164,122,.55)", axis:"#22303f",
    tick:"#6b5d40", ghost:"#22303f", label:"#6b5d40",
    frameEdge:"#b9a47a", frameFill:"rgba(35,57,107,.05)", frameTitle:"#23396b",
    comment:"#6b5d40",
    plotCols:["#aa3a2c","#23396b","#3f6d4e","#a87a1f"],
  },
};
let TH = THEMES.ink;
function setTheme(name){
  TH = THEMES[name] || THEMES.ink;
  for(const [k,v] of Object.entries(TH.css))
    document.documentElement.style.setProperty("--"+k, v);
  drawAll();
}

/* ---------------- modes ----------------
   1d : plot node renders y = f(x)
   par: plot xy renders ( x(t), y(t) ), t in tDom
   la : typed wires (scalar/vec/mat); draw vec & draw mat render the plane */
let MODE = "1d";
let tDom = {a:0, b:6.2832};
function VN(){ return MODE==="par" ? "t" : "x"; }
function CN(){ return MODE==="1d" ? "t" : "τ"; }
function modeOK(def){ return !def.modes || def.modes.includes(MODE); }
const PLOT_OF_MODE = {PLOT:"1d", PLOT2:"par", DRAWV:"la", DRAWM:"la", FIT:"train"};

/* ---------------- node definitions ---------------- */
const PRE = "const {sin,cos,tan,exp,log,sqrt,floor,abs,sign,min,max,pow,atan}=Math;" +
  "const PI=Math.PI;" +
  "const frac=a=>a-Math.floor(a);" +
  "const mod=(a,b)=>((a%b)+b)%b;" +
  "const clamp=(a,lo,hi)=>Math.min(Math.max(a,lo),hi);" +
  "const mix=(a,b,k)=>a+(b-a)*k;" +
  "const smoothstep=(e0,e1,a)=>{const k=Math.min(Math.max((a-e0)/(e1-e0),0),1);return k*k*(3-2*k);};" +
  "const v2=(x,y)=>[x,y];" +
  "const vadd=(a,b)=>[a[0]+b[0],a[1]+b[1]];" +
  "const vsub=(a,b)=>[a[0]-b[0],a[1]-b[1]];" +
  "const vscale=(s,a)=>[s*a[0],s*a[1]];" +
  "const dot2=(a,b)=>a[0]*b[0]+a[1]*b[1];" +
  "const len2=a=>Math.hypot(a[0],a[1]);" +
  "const norm2=a=>{const l=Math.hypot(a[0],a[1]);return l>1e-12?[a[0]/l,a[1]/l]:[0,0];};" +
  "const proj2=(a,b)=>{const d=dot2(b,b);return d>1e-12?vscale(dot2(a,b)/d,b):[0,0];};" +
  "const perp2=a=>[-a[1],a[0]];" +
  "const rot2=th=>[Math.cos(th),-Math.sin(th),Math.sin(th),Math.cos(th)];" +
  "const scl2=(sx,sy)=>[sx,0,0,sy];" +
  "const shr2=(kx,ky)=>[1,kx,ky,1];" +
  "const mv=(m,v)=>[m[0]*v[0]+m[1]*v[1], m[2]*v[0]+m[3]*v[1]];" +
  "const mm=(A,B)=>[A[0]*B[0]+A[1]*B[2], A[0]*B[1]+A[1]*B[3], A[2]*B[0]+A[3]*B[2], A[2]*B[1]+A[3]*B[3]];" +
  "const det2=m=>m[0]*m[3]-m[1]*m[2];" +
  "const inv2=m=>{const d=det2(m);if(Math.abs(d)<1e-12)return[NaN,NaN,NaN,NaN];return[m[3]/d,-m[1]/d,-m[2]/d,m[0]/d];};" +
  "const mmix=(A,B,k)=>[A[0]+(B[0]-A[0])*k,A[1]+(B[1]-A[1])*k,A[2]+(B[2]-A[2])*k,A[3]+(B[3]-A[3])*k];" +
  "const __mb=s=>{let a=(s*1000+17)>>>0;return()=>{a|=0;a=a+0x6D2B79F5|0;let q=Math.imul(a^a>>>15,1|a);q=q+Math.imul(q^q>>>7,61|q)^q;return((q^q>>>14)>>>0)/4294967296;};};" +
  "const __gauss=r=>{const u=Math.max(r(),1e-9),v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185307179586*v);};" +
  "const __nc=n=>Math.min(400,Math.max(2,Math.round(n)));" +
  "const genLine=(n,a,b,sg,seed)=>{const r=__mb(seed),o=[];for(let q=0;q<__nc(n);q++){const X=-2.5+5*r();o.push([X,a*X+b+sg*__gauss(r)]);}return o;};" +
  "const genWave=(n,k,A,sg,seed)=>{const r=__mb(seed+31),o=[];for(let q=0;q<__nc(n);q++){const X=-2.5+5*r();o.push([X,A*Math.sin(k*X)+sg*__gauss(r)]);}return o;};" +
  "const genStep=(n,sg,seed)=>{const r=__mb(seed+59),o=[];for(let q=0;q<__nc(n);q++){const X=-2.5+5*r();o.push([X,(Math.sin(1.6*X)>=0?0.8:-0.8)+sg*__gauss(r)]);}return o;};" +
  "const genClass=(n,gap,sg,seed)=>{const r=__mb(seed+83),o=[];for(let q=0;q<__nc(n);q++){const cls=r()<0.5?0:1;const X=(cls?gap:-gap)/2+sg*__gauss(r);o.push([X,cls]);}return o;};" +
  "const shuffleD=(d,seed)=>{const r=__mb(seed*7+3),o=d.slice();for(let q=o.length-1;q>0;q--){const j=Math.floor(r()*(q+1));const tp=o[q];o[q]=o[j];o[j]=tp;}return o;};" +
  "const splitD=(d,ratio,which)=>{const c=Math.round(d.length*Math.min(1,Math.max(0,ratio)));return which?d.slice(c):d.slice(0,c);};" +
  "const batchD=(d,k,s)=>{if(!d.length)return d;const K=Math.min(d.length,Math.max(1,Math.round(k)));const o=[];const st=(Math.max(0,Math.round(s))*K)%d.length;for(let q=0;q<K;q++)o.push(d[(st+q)%d.length]);return o;};" +
  "const STEP=()=>(globalThis.__trainStep||0);";

const CAT = { src:"◈ source", ari:"＋ arithmetic", wav:"∿ wave",
              shp:"⌗ shape", dat:"⛁ data", vec:"⇀ vector", mat:"▦ matrix",
              flw:"⟳ flow", log:"≷ logic",
              ann:"✎ annotate", out:"▤ output" };
const M12 = ["1d","par"];   // classic scalar-signal modes

const DEFS = {
  X:      {cat:"src", label:"x",       ins:[], modes:["1d","par","train"]},
  TIME:   {cat:"src", label:"time",    ins:[], modes:["1d","par","la"]},
  INDEX:  {cat:"src", label:"index i", ins:[], modes:M12},
  CONST:  {cat:"src", label:"const",   ins:[], hasVal:true},
  PARAM:  {cat:"src", label:"param",   ins:[], hasVal:true, learn:true, modes:["train"]},
  ADD:    {cat:"ari", label:"add",   ins:["a","b"], d:[0,0], ex:(a,b)=>`(${a} + ${b})`},
  SUB:    {cat:"ari", label:"sub",   ins:["a","b"], d:[0,0], ex:(a,b)=>`(${a} - ${b})`},
  MUL:    {cat:"ari", label:"mul",   ins:["a","b"], d:[1,1], ex:(a,b)=>`(${a} * ${b})`},
  DIV:    {cat:"ari", label:"div",   ins:["a","b"], d:[0,1], ex:(a,b)=>`(${a} / ${b})`},
  NEG:    {cat:"ari", label:"neg",   ins:["a"],     d:[0],   ex:(a)=>`(-${a})`},
  SIN:    {cat:"wav", label:"sin",   ins:["a"],     d:[0],   ex:(a)=>`sin(${a})`},
  COS:    {cat:"wav", label:"cos",   ins:["a"],     d:[0],   ex:(a)=>`cos(${a})`},
  TAN:    {cat:"wav", label:"tan",   ins:["a"],     d:[0],   modes:M12, ex:(a)=>`tan(${a})`},
  EXP:    {cat:"wav", label:"exp",   ins:["a"],     d:[0],   modes:M12, ex:(a)=>`exp(${a})`},
  LOG:    {cat:"wav", label:"log",   ins:["a"],     d:[1],   modes:M12, ex:(a)=>`log(${a})`},
  SQRT:   {cat:"wav", label:"sqrt",  ins:["a"],     d:[0],   ex:(a)=>`sqrt(${a})`},
  SIGM:   {cat:"wav", label:"sigmoid σ", ins:["z"], d:[0], modes:["1d","train"],
           ex:(a)=>`(1/(1+exp(-(${a}))))`},
  POW:    {cat:"wav", label:"pow",   ins:["a","b"], d:[0,2], ex:(a,b)=>`pow(${a}, ${b})`},
  ABS:    {cat:"shp", label:"abs",   ins:["a"],     d:[0],   ex:(a)=>`abs(${a})`},
  SIGN:   {cat:"shp", label:"sign",  ins:["a"],     d:[0],   modes:M12, ex:(a)=>`sign(${a})`},
  FLOOR:  {cat:"shp", label:"floor", ins:["a"],     d:[0],   modes:M12, ex:(a)=>`floor(${a})`},
  FRAC:   {cat:"shp", label:"frac",  ins:["a"],     d:[0],   modes:M12, ex:(a)=>`frac(${a})`},
  MOD:    {cat:"shp", label:"mod",   ins:["a","b"], d:[0,2], modes:M12, ex:(a,b)=>`mod(${a}, ${b})`},
  MIN:    {cat:"shp", label:"min",   ins:["a","b"], d:[0,0], ex:(a,b)=>`min(${a}, ${b})`},
  MAX:    {cat:"shp", label:"max",   ins:["a","b"], d:[0,0], ex:(a,b)=>`max(${a}, ${b})`},

function fmtNum(v){ const s = Number(v.toPrecision(6)).toString(); return v<0?`(${s})`:s; }
function fmtFull(v){ const s = String(v); return v<0?`(${s})`:s; }   // compiler: no display rounding
function portType(def,i){ return (def.tin && def.tin[i]) || "s"; }
function outTypeOf(def){ return def.out || "s"; }

/* ---------------- graph model ---------------- */
let nodes = [];
let wires = [];
let nextId = 1;
let selId = -1;
let selWire = null;
let t = 0, playing = false;
const undoStack = [];
const redoStack = [];
let glast = null;
let clip = null, pasteShift = 0;

function addNode(type, x, y, val){
  const n = {id:nextId++, type, x, y, val:(val!==undefined?val:1)};
  if (type==="COMMENT") n.text = "note…";
  if (type==="FRAME"){ n.text = "frame"; n.w = 230; n.h = 150; }
  nodes.push(n); return n;
}
function nodeById(id){ return nodes.find(n=>n.id===id); }
function wireInto(id, port){ return wires.find(w=>w.to===id && w.port===port); }
function reaches(a, b){
  if (a===b) return true;
  return wires.filter(w=>w.from===a).some(w=>reaches(w.to,b));
}
function canConnect(from, to, port){
  const fd = DEFS[nodeById(from).type], td = DEFS[nodeById(to).type];
  return outTypeOf(fd) === portType(td, port);
}
function connect(from, to, port){
  if (from===to) return;
  if (reaches(to, from)) return;
  if (!canConnect(from, to, port)) return;
  wires = wires.filter(w=>!(w.to===to && w.port===port));
  wires.push({from,to,port});
}
function removeNode(id){
  nodes = nodes.filter(n=>n.id!==id);
  wires = wires.filter(w=>w.from!==id && w.to!==id);
  if (selId===id) selId=-1;
}

/* ---------------- undo / redo ---------------- */
function snapshot(){ return JSON.stringify({nodes,wires,nextId}); }
function restore(s){
  const o = JSON.parse(s);
  nodes=o.nodes; wires=o.wires; nextId=o.nextId;
  selId=-1; selWire=null;
  updateInspector(); drawAll();
}
function beginAction(){
  undoStack.push(snapshot());
  if (undoStack.length>60) undoStack.shift();
}
function endAction(){
  if (!undoStack.length) return;
  if (undoStack[undoStack.length-1]===snapshot()) undoStack.pop();
  else redoStack.length=0;
}
function undo(){
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  restore(undoStack.pop());
}
function redo(){
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  restore(redoStack.pop());
}

/* ---------------- selection / clipboard ---------------- */
function deleteSelected(){
  if (selWire){ beginAction(); wires=wires.filter(w=>w!==selWire);
    selWire=null; endAction(); drawAll(); return; }
  if (selId>=0){ beginAction(); removeNode(selId); endAction();
    updateInspector(); drawAll(); }
}
function insideFrame(m, f){
  const cx = m.x + nodeW(m)/2, cy = m.y + nodeH(m)/2;
  return cx>f.x && cx<f.x+f.w && cy>f.y && cy<f.y+f.h;
}
function cloneNode(n){ return JSON.parse(JSON.stringify(n)); }
function copySelected(){
  if (selId<0) return;
  const n = nodeById(selId); if(!n) return;
  if (n.type==="FRAME"){
    const members = nodes.filter(m=>m.id!==n.id && m.type!=="FRAME" && insideFrame(m,n));
    const ids = new Set([n.id, ...members.map(m=>m.id)]);
    clip = { nodes:[n,...members].map(cloneNode),
             wires:wires.filter(w=>ids.has(w.from)&&ids.has(w.to)).map(w=>({...w})) };
  } else {
    clip = { nodes:[cloneNode(n)], wires:[] };
  }
  pasteShift = 0;
}
function pasteClip(base){
  if (!clip || !clip.nodes.length) return;
  beginAction();
  pasteShift += 18;
  const minx = Math.min(...clip.nodes.map(n=>n.x));
  const miny = Math.min(...clip.nodes.map(n=>n.y));
  const b = base || glast || {x:(GW/2-gpan.x)/gscale, y:(GH/2-gpan.y)/gscale};
  const dx = b.x - minx + pasteShift, dy = b.y - miny + pasteShift;
  const idMap = new Map();
  let firstNew = null;
  for(const cn of clip.nodes){
    const nn = addNode(cn.type, cn.x+dx, cn.y+dy, cn.val);
    if (cn.text!==undefined) nn.text = cn.text;
    if (cn.w!==undefined) nn.w = cn.w;
    if (cn.h!==undefined) nn.h = cn.h;
    idMap.set(cn.id, nn.id);
    if (!firstNew) firstNew = nn;
  }
  for(const w of clip.wires)
    wires.push({from:idMap.get(w.from), to:idMap.get(w.to), port:w.port});
  selId = firstNew.id; selWire = null;
  endAction();
  updateInspector(); drawAll();
}
function duplicateSelected(){
  if (selId<0) return;
  const n = nodeById(selId); if(!n) return;
  copySelected();
  pasteShift = 6;
  pasteClip({x:n.x, y:n.y});
}
function wireAt(p){
  let best=null, bd=(10/gscale)**2;
  for(const w of wires){
    const a=outPortPos(nodeById(w.from)), b=inPortPos(nodeById(w.to),w.port);
    const k=Math.max(28,Math.abs(b.x-a.x)*0.5);
    for(let s=0;s<=24;s++){
      const u=s/24, v=1-u;
      const X=v*v*v*a.x + 3*v*v*u*(a.x+k) + 3*v*u*u*(b.x-k) + u*u*u*b.x;
      const Y=v*v*v*a.y + 3*v*v*u*a.y     + 3*v*u*u*b.y     + u*u*u*b.y;
      const d=(p.x-X)**2+(p.y-Y)**2;
      if (d<bd){ bd=d; best=w; }
    }
  }
  return best;
}
function placeNode(type, wx, wy){
  beginAction();
  const n = addNode(type, wx-NW/2, wy-16, 1);
  selId=n.id; selWire=null;
  endAction();
  updateInspector(); drawAll();
  return n;
}

/* ---------------- save / load graph ---------------- */
function serializeGraph(){
  return JSON.stringify({app:"function-loom", v:12, mode:MODE, tDom:{...tDom},
    nodes:nodes.map(n=>{
      const o={id:n.id,type:n.type,x:Math.round(n.x),y:Math.round(n.y),val:n.val};
      if (n.text!==undefined) o.text=n.text;
      if (n.w!==undefined) o.w=n.w;
      if (n.h!==undefined) o.h=n.h;
      if (n.alpha!==undefined) o.alpha=n.alpha;
      if (n.loss!==undefined) o.loss=n.loss;
      if (n.opt!==undefined) o.opt=n.opt;
      return o;
    }),
    wires, nextId}, null, 1);
}
function loadGraphObject(o){
  if (!o || o.app!=="function-loom" || !Array.isArray(o.nodes)) return false;
  const ns = o.nodes.filter(n=>DEFS[n.type]);
  const ids = new Set(ns.map(n=>n.id));
  const ws = (o.wires||[]).filter(w=>ids.has(w.from)&&ids.has(w.to)
    && nodesTypeOk(ns,w));
  beginAction();
  nodes = ns.map(n=>{
    const m={id:n.id,type:n.type,x:n.x,y:n.y,val:(n.val!==undefined?n.val:1)};
    if (n.text!==undefined) m.text=n.text;
    if (n.w!==undefined) m.w=n.w;
    if (n.h!==undefined) m.h=n.h;
    if (n.alpha!==undefined) m.alpha=n.alpha;
    if (n.loss!==undefined) m.loss=n.loss;
    if (n.opt!==undefined) m.opt=n.opt;
    if (n.type==="FRAME"){ m.text=m.text||"frame"; m.w=m.w||230; m.h=m.h||150; }
    if (n.type==="COMMENT") m.text=m.text||"note…";
    return m;
  });
  wires = ws.map(w=>({from:w.from,to:w.to,port:w.port}));
  nextId = o.nextId || (Math.max(0,...nodes.map(n=>n.id))+1);
  selId=-1; selWire=null;
  endAction();
  if (o.tDom && isFinite(o.tDom.a) && isFinite(o.tDom.b)) tDom={a:o.tDom.a,b:o.tDom.b};
  trainStepCount = 0; globalThis.__trainStep = 0; clearHist();
  SHOW_LAND = (o.mode==="train"); lview=null; selPt=null;
  setMode(["par","la","train"].includes(o.mode) ? o.mode : "1d", true);
  gpan={x:0,y:0}; gscale=1;
  updateInspector(); drawAll();
  return true;
}
function nodesTypeOk(ns,w){
  const to = ns.find(n=>n.id===w.to);
  const fr = ns.find(n=>n.id===w.from);
  return to && fr && w.port>=0 && w.port < DEFS[to.type].ins.length
      && outTypeOf(DEFS[fr.type]) === portType(DEFS[to.type], w.port);
}
function saveGraphFile(){
  const blob = new Blob([serializeGraph()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "math-graph.json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
}
const fileIn = document.getElementById("fileIn");
fileIn.addEventListener("change", ()=>{
  const f = fileIn.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{ try{ loadGraphObject(JSON.parse(rd.result)); }
    catch(e){ alert("could not read that graph file"); } };
  rd.readAsText(f);
  fileIn.value="";
});

/* ---------------- compile ---------------- */
function isFnIn(def,i){ return (def.fin||[]).includes(i); }
function typedDefault(def,i){
  const ty = portType(def,i);
  if (ty==="v") return "[0,0]";
  if (ty==="m") return "[1,0,0,1]";
  if (ty==="d") return "[]";
  return fmtFull(def.d ? def.d[i] : 0);
}
function callArg(nid, i){
  const def = DEFS[nodeById(nid).type];
  const w = wireInto(nid, i);
  if (w) return isFnIn(def,i) ? `n${w.from}` : `n${w.from}(x,t,i)`;
  return isFnIn(def,i) ? `((x,t,i)=>0)` : typedDefault(def,i);
}
function localExpr(nid){
  const n = nodeById(nid), def = DEFS[n.type];
  const A = def.ins.map((_,i)=>callArg(nid,i));
  switch(n.type){
    case "X":     return "x";
    case "TIME":  return "t";
    case "INDEX": return "i";
    case "CONST": return fmtFull(n.val);
    case "PARAM": return `((globalThis.__pvals&&globalThis.__pvals[${n.id}]!==undefined)?globalThis.__pvals[${n.id}]:${fmtFull(n.val)})`;
    case "DGLINE":return `genLine(${A[0]}, ${A[1]}, ${A[2]}, ${A[3]}, ${A[4]})`;
    case "DGWAVE":return `genWave(${A[0]}, ${A[1]}, ${A[2]}, ${A[3]}, ${A[4]})`;
    case "DGSTEP":return `genStep(${A[0]}, ${A[1]}, ${A[2]})`;
    case "DGCLASS":return `genClass(${A[0]}, ${A[1]}, ${A[2]}, ${A[3]})`;
    case "SHUF":  return `shuffleD(${A[0]}, ${A[1]})`;
    case "DTRAIN":return `splitD(${A[0]}, ${A[1]}, 0)`;
    case "DTEST": return `splitD(${A[0]}, ${A[1]}, 1)`;
    case "DBATCH":return `batchD(${A[0]}, ${A[1]}, STEP())`;
    case "FIT":   return A[0];
    case "SAMPLE":return `(${A[0]})((${A[1]}), t, i)`;
    case "SHIFT": return `(${A[0]})(x - (${A[1]}), t, i)`;
    case "DIFF":  return `((h)=>((${A[0]})(x+h,t,i) - (${A[0]})(x-h,t,i)) / (2*h))(${A[1]})`;
    case "BLUR":  return `((w)=>{let s=0,z=0;for(let k=-4;k<=4;k++){const g=Math.exp(-(k*k)/8);z+=g;s+=g*(${A[0]})(x+w*k/4,t,i);}return s/z;})(${A[1]})`;
    case "SUM":   return `((N)=>{const M=Math.min(200,Math.max(0,Math.round(N)));let s=0;for(let k=0;k<M;k++)s+=(${A[0]})(x,t,k);return s;})(${A[1]})`;
    case "PROD":  return `((N)=>{const M=Math.min(200,Math.max(0,Math.round(N)));let s=1;for(let k=0;k<M;k++)s*=(${A[0]})(x,t,k);return s;})(${A[1]})`;
    case "GT":    return `((${A[0]}) > (${A[1]}) ? 1 : 0)`;
    case "LT":    return `((${A[0]}) < (${A[1]}) ? 1 : 0)`;
    case "GE":    return `((${A[0]}) >= (${A[1]}) ? 1 : 0)`;
    case "LE":    return `((${A[0]}) <= (${A[1]}) ? 1 : 0)`;
    case "EQ":    return `(abs((${A[0]}) - (${A[1]})) < (${A[2]}) ? 1 : 0)`;
    case "NOT":   return `((${A[0]}) > 0.5 ? 0 : 1)`;
    case "AND":   return `(((${A[0]}) > 0.5 && (${A[1]}) > 0.5) ? 1 : 0)`;
    case "OR":    return `(((${A[0]}) > 0.5 || (${A[1]}) > 0.5) ? 1 : 0)`;
    case "XOR":   return `((((${A[0]}) > 0.5) !== ((${A[1]}) > 0.5)) ? 1 : 0)`;
    case "IF":    return `((${A[0]}) > 0.5 ? (${A[1]}) : (${A[2]}))`;
    case "VEC":   return `[${A[0]}, ${A[1]}]`;
    case "POLAR": return `((r,th)=>[r*Math.cos(th), r*Math.sin(th)])(${A[0]}, ${A[1]})`;
    case "VX":    return `(${A[0]})[0]`;
    case "VY":    return `(${A[0]})[1]`;
    case "VADD":  return `vadd(${A[0]}, ${A[1]})`;
    case "VSUB":  return `vsub(${A[0]}, ${A[1]})`;
    case "VSCALE":return `vscale(${A[0]}, ${A[1]})`;
    case "DOT":   return `dot2(${A[0]}, ${A[1]})`;
    case "LEN":   return `len2(${A[0]})`;
    case "NORM":  return `norm2(${A[0]})`;
    case "PROJ":  return `proj2(${A[0]}, ${A[1]})`;
    case "PERP":  return `perp2(${A[0]})`;
    case "ROT":   return `rot2(${A[0]})`;
    case "SCL2":  return `scl2(${A[0]}, ${A[1]})`;
    case "SHEAR": return `shr2(${A[0]}, ${A[1]})`;
    case "MAT":   return `[${A[0]}, ${A[2]}, ${A[1]}, ${A[3]}]`;
    case "MV":    return `mv(${A[0]}, ${A[1]})`;
    case "MM":    return `mm(${A[0]}, ${A[1]})`;
    case "DET":   return `det2(${A[0]})`;
    case "INV":   return `inv2(${A[0]})`;
    case "MMIX":  return `mmix(${A[0]}, ${A[1]}, ${A[2]})`;
    case "DRAWV": return A[0];
    case "DRAWM": return A[0];
    case "COMMENT": case "FRAME": return "0";
    case "PLOT2": return A[0];
    default:      return def.ex(...A);
  }
}
function orderFrom(id){
  const order=[], seen=new Set();
  (function visit(nid){
    if (seen.has(nid) || !nodeById(nid)) return;
    seen.add(nid);
    for (const w of wires) if (w.to===nid) visit(w.from);
    order.push(nid);
  })(id);
  return order;
}
function compile(id){
  let code = "";
  for (const nid of orderFrom(id))
    code += `const n${nid} = (x,t,i)=>(${localExpr(nid)});\n`;
  try { return new Function(PRE + code + `return n${id};`)(); }
  catch(e){ return ()=>NaN; }
}
function compileInput(nid, i){
  const w = wireInto(nid, i);
  if (w) return compile(w.from);
  const def = DEFS[nodeById(nid).type];
  const ty = portType(def,i);
  if (ty==="v") return ()=>[0,0];
  if (ty==="m") return ()=>[1,0,0,1];
  if (ty==="d") return ()=>[];
  const v = def.d ? def.d[i] : 0;
  return ()=>v;
}

/* ---------------- pretty printer ---------------- */
function pArg(nid, i, xn){
  const def = DEFS[nodeById(nid).type];
  const w = wireInto(nid, i);
  if (w) return pexpr(w.from, xn);
  const ty = portType(def,i);
  if (ty==="v") return "(0, 0)";
  if (ty==="m") return "I";
  if (ty==="d") return "∅";
  return fmtNum(def.d ? def.d[i] : 0);
}
function pexpr(id, xn, depth){
  depth = (depth||0)+1; if (depth>60) return "…";
  const n = nodeById(id); if (!n) return "0";
  const def = DEFS[n.type];
  const wf = wireInto(id, 0);
  switch(n.type){
    case "X":     return xn;
    case "TIME":  return CN();
    case "INDEX": return "i";
    case "CONST": return fmtNum(n.val);
    case "PARAM": return fmtNum(n.val);
    case "DGLINE":return `line-data(n=${pArg(id,0,xn)})`;
    case "DGWAVE":return `wave-data(n=${pArg(id,0,xn)})`;
    case "DGSTEP":return `step-data(n=${pArg(id,0,xn)})`;
    case "DGCLASS":return `class-data(n=${pArg(id,0,xn)})`;
    case "SIGM":  return `σ(${pArg(id,0,xn)})`;
    case "SHUF":  return `shuffle(${pArg(id,0,xn)})`;
    case "DTRAIN":return `train⟨${pArg(id,1,xn)}⟩(${pArg(id,0,xn)})`;
    case "DTEST": return `test⟨${pArg(id,1,xn)}⟩(${pArg(id,0,xn)})`;
    case "DBATCH":return `batch⟨${pArg(id,1,xn)}⟩(${pArg(id,0,xn)})`;
    case "FIT":   return wf ? pexpr(wf.from, xn, depth) : "0";
    case "SAMPLE":return wf ? pexpr(wf.from, `(${pArg(id,1,xn)})`, depth) : "0";
    case "SHIFT": return wf ? pexpr(wf.from, `(${xn} - ${pArg(id,1,xn)})`, depth) : "0";
    case "DIFF":  return `d/d${VN()}[ ${wf?pexpr(wf.from,xn,depth):"0"} ]`;
    case "BLUR":  return `blur⟨${pArg(id,1,xn)}⟩[ ${wf?pexpr(wf.from,xn,depth):"0"} ]`;
    case "SUM":   return `Σ_{i=0..${pArg(id,1,xn)}} ( ${wf?pexpr(wf.from,xn,depth):"0"} )`;
    case "PROD":  return `Π_{i=0..${pArg(id,1,xn)}} ( ${wf?pexpr(wf.from,xn,depth):"0"} )`;
    case "GT":    return `(${pArg(id,0,xn)} > ${pArg(id,1,xn)})`;
    case "LT":    return `(${pArg(id,0,xn)} < ${pArg(id,1,xn)})`;
    case "GE":    return `(${pArg(id,0,xn)} ≥ ${pArg(id,1,xn)})`;
    case "LE":    return `(${pArg(id,0,xn)} ≤ ${pArg(id,1,xn)})`;
    case "EQ":    return `(${pArg(id,0,xn)} ≈ ${pArg(id,1,xn)})`;
    case "NOT":   return `¬(${pArg(id,0,xn)})`;
    case "AND":   return `(${pArg(id,0,xn)} ∧ ${pArg(id,1,xn)})`;
    case "OR":    return `(${pArg(id,0,xn)} ∨ ${pArg(id,1,xn)})`;
    case "XOR":   return `(${pArg(id,0,xn)} ⊕ ${pArg(id,1,xn)})`;
    case "IF":    return `(${pArg(id,0,xn)} ? ${pArg(id,1,xn)} : ${pArg(id,2,xn)})`;
    case "VEC":   return `(${pArg(id,0,xn)}, ${pArg(id,1,xn)})`;
    case "POLAR": return `polar(${pArg(id,0,xn)}, ${pArg(id,1,xn)})`;
    case "VX":    return `x(${pArg(id,0,xn)})`;
    case "VY":    return `y(${pArg(id,0,xn)})`;
    case "VADD":  return `(${pArg(id,0,xn)} + ${pArg(id,1,xn)})`;
    case "VSUB":  return `(${pArg(id,0,xn)} − ${pArg(id,1,xn)})`;
    case "VSCALE":return `(${pArg(id,0,xn)} · ${pArg(id,1,xn)})`;
    case "DOT":   return `(${pArg(id,0,xn)} · ${pArg(id,1,xn)})`;
    case "LEN":   return `|${pArg(id,0,xn)}|`;
    case "NORM":  return `norm(${pArg(id,0,xn)})`;
    case "PROJ":  return `proj_{${pArg(id,1,xn)}}(${pArg(id,0,xn)})`;
    case "PERP":  return `⊥(${pArg(id,0,xn)})`;
    case "ROT":   return `R(${pArg(id,0,xn)})`;
    case "SCL2":  return `S(${pArg(id,0,xn)}, ${pArg(id,1,xn)})`;
    case "SHEAR": return `K(${pArg(id,0,xn)}, ${pArg(id,1,xn)})`;
    case "MAT":   return `[[${pArg(id,0,xn)} ${pArg(id,2,xn)}][${pArg(id,1,xn)} ${pArg(id,3,xn)}]]`;
    case "MV":    return `(${pArg(id,0,xn)} · ${pArg(id,1,xn)})`;
    case "MM":    return `(${pArg(id,0,xn)} · ${pArg(id,1,xn)})`;
    case "DET":   return `det(${pArg(id,0,xn)})`;
    case "INV":   return `(${pArg(id,0,xn)})⁻¹`;
    case "MMIX":  return `mix(${pArg(id,0,xn)}, ${pArg(id,1,xn)}, ${pArg(id,2,xn)})`;
    case "DRAWV": return wireInto(id,1)
                    ? `${pArg(id,0,xn)}  ⟨at ${pArg(id,1,xn)}⟩`
                    : pArg(id,0,xn);
    case "DRAWM": return pArg(id,0,xn);
    case "PLOT":  return pArg(id,0,xn);
    case "PLOT2": return `( ${pArg(id,0,xn)} , ${pArg(id,1,xn)} )`;
    default:      return def.ex(...def.ins.map((_,i)=>pArg(id,i,xn)));
  }
}
function prettyOf(id){
  let s = pexpr(id, VN());
  if (s.length>230) s = s.slice(0,110) + " … " + s.slice(-110);

}

function defaultLview(np){

/* ---------------- graph view / geometry ---------------- */
let gpan = {x:0,y:0};
let gscale = 1;
const NW = 88;
const CMW = 150;
function commentLines(n){
  gctx.font = "11px Iowan Old Style, Palatino, Georgia, serif";
  const words = String(n.text||"").split(/\s+/);
  const lines=[]; let line="";
  for(const w of words){
    const test = line ? line+" "+w : w;
    if (gctx.measureText(test).width > CMW-16 && line){ lines.push(line); line=w; }
    else line=test;
  }
  if (line) lines.push(line);
  return lines.length ? lines : [""];
}
function nodeW(n){
  if (n.type==="FRAME") return n.w;
  if (n.type==="COMMENT") return CMW;
  return NW;
}
function nodeH(n){
  if (n.type==="FRAME") return n.h;
  if (n.type==="COMMENT") return 14 + commentLines(n).length*14;
  return 26 + Math.max(DEFS[n.type].ins.length,1)*18;
}
function inPortPos(n,i){ return {x:n.x, y:n.y+26+i*18+7}; }
function outPortPos(n){ return {x:n.x+NW, y:n.y+nodeH(n)/2}; }
function nodeTitle(n){
  if (n.type==="X")    return MODE==="par" ? "param t" : "x";
  if (n.type==="TIME") return MODE==="1d" ? "time" : "time τ";
  const def = DEFS[n.type];
  return def.hasVal ? fmtNum(n.val) : def.label;
}
function inactivePlot(n){
  const m = PLOT_OF_MODE[n.type];
  return m !== undefined && m !== MODE;
}
function typeColor(ty){
  return ty==="v" ? TH.vec : ty==="m" ? TH.mat : ty==="d" ? TH.data : TH.portVal;
}
function typeWire(ty){
  return ty==="v" ? TH.vec : ty==="m" ? TH.mat : ty==="d" ? TH.data : TH.wireVal;
}

function drawGraph(){
  const c = gctx;
  c.setTransform(DPR,0,0,DPR,0,0);
  c.clearRect(0,0,GW,GH);
  c.fillStyle = TH.css.stage; c.fillRect(0,0,GW,GH);
  c.fillStyle = TH.gridDot;
  const step=26*gscale, ox = ((gpan.x%step)+step)%step, oy=((gpan.y%step)+step)%step;
  const dsz = Math.max(1, 1.4*gscale);
  for(let x=ox; x<GW; x+=step) for(let y=oy; y<GH; y+=step) c.fillRect(x,y,dsz,dsz);
  c.translate(gpan.x, gpan.y);
  c.scale(gscale, gscale);

  for(const n of nodes) if (n.type==="FRAME"){
    const sel = n.id===selId;
    c.fillStyle = TH.frameFill;
    c.strokeStyle = sel ? TH.nodeSel : TH.frameEdge;
    c.lineWidth = sel ? 2.2 : 1.4;
    rr(c, n.x, n.y, n.w, n.h, 6); c.fill(); c.stroke();
    c.strokeStyle = sel ? TH.nodeSel : TH.frameEdge; c.lineWidth=1;
    c.beginPath(); c.moveTo(n.x+4,n.y+22); c.lineTo(n.x+n.w-4,n.y+22); c.stroke();
    c.fillStyle = TH.frameTitle;
    c.font = "12px Iowan Old Style, Palatino, Georgia, serif";
    c.textAlign="left"; c.textBaseline="middle";
    c.fillText(n.text||"frame", n.x+9, n.y+12);
    c.beginPath();
    c.moveTo(n.x+n.w-11, n.y+n.h-3); c.lineTo(n.x+n.w-3, n.y+n.h-11);
    c.moveTo(n.x+n.w-7,  n.y+n.h-3); c.lineTo(n.x+n.w-3, n.y+n.h-7);
    c.strokeStyle = TH.frameEdge; c.lineWidth=1.4; c.stroke();
  }

  if (selWire && !wires.includes(selWire)) selWire=null;
  for(const w of wires){
    const toN = nodeById(w.to), frN = nodeById(w.from);
    const fnWire = isFnIn(DEFS[toN.type], w.port);
    const ty = outTypeOf(DEFS[frN.type]);
    const a = outPortPos(frN), b = inPortPos(toN, w.port);
    if (w===selWire) drawWire(c, a, b, TH.wireDrag, 3);
    else if (fnWire) drawWire(c, a, b, TH.wireFn, 2.4);
    else drawWire(c, a, b, typeWire(ty), ty==="s" ? 1.8 : 2.4);
    if (MODE==="train" && GLOW && glowMap && glowMap.mx>0 && glowMap.res.has(w.from)){
      const norm = glowMap.res.get(w.from)/glowMap.mx;
      c.globalAlpha = 0.12 + 0.72*norm;
      drawWire(c, a, b, TH.css.red, 1 + 3.4*norm);
      c.globalAlpha = 1;
    }
  }
  if (drag.kind==="wire"){
    const a = drag.fromOut ? outPortPos(nodeById(drag.node)) : {x:drag.mx,y:drag.my};
    const b = drag.fromOut ? {x:drag.mx,y:drag.my} : inPortPos(nodeById(drag.node), drag.port);
    drawWire(c, a, b, TH.wireDrag, 1.8, true);
    if (drag.hover){
      const hn = nodeById(drag.hover.node);
      const hp = drag.hover.out ? outPortPos(hn) : inPortPos(hn, drag.hover.port);
      c.beginPath(); c.arc(hp.x, hp.y, 9, 0, 7);
      c.strokeStyle=TH.wireDrag; c.lineWidth=2.2; c.stroke();
    }
  }

  for(const n of nodes){
    if (n.type==="FRAME") continue;
    const sel = n.id===selId;
    if (n.type==="COMMENT"){
      const lines = commentLines(n), h = nodeH(n);
      c.strokeStyle = sel ? TH.nodeSel : TH.comment;
      c.lineWidth = sel ? 1.8 : 1.1;
      c.setLineDash([4,3]);
      rr(c, n.x, n.y, CMW, h, 4); c.stroke();
      c.setLineDash([]);
      c.fillStyle = TH.comment;
      c.font = "11px Iowan Old Style, Palatino, Georgia, serif";
      c.textAlign="left"; c.textBaseline="middle";
      lines.forEach((ln,ix)=>c.fillText(ln, n.x+8, n.y+14+ix*14));
      continue;
    }
    const def = DEFS[n.type], h = nodeH(n);
    if (inactivePlot(n)) c.globalAlpha = 0.45;
    c.fillStyle = TH.nodeFill;
    c.strokeStyle = sel ? TH.nodeSel : TH.nodeStroke;
    c.lineWidth = sel ? 2.4 : 1.6;
    rr(c, n.x, n.y, NW, h, 4); c.fill(); c.stroke();
    if (def.learn){ c.strokeStyle=TH.nodeSel; c.lineWidth=1;
      rr(c, n.x+3, n.y+3, NW-6, h-6, 3); c.stroke(); }
    const oty = outTypeOf(def);
    c.fillStyle = PLOT_OF_MODE[n.type]!==undefined ? plotColor(n.id)
                : def.learn ? TH.css.red
                : (def.cat==="flw" ? TH.flowTitle
                : oty==="v" ? TH.vec : oty==="m" ? TH.mat : oty==="d" ? TH.data : TH.title);
    c.font = "12px Iowan Old Style, Palatino, Georgia, serif";
    c.textAlign="center"; c.textBaseline="middle";
    c.fillText(nodeTitle(n), n.x+NW/2, n.y+13);
    c.strokeStyle=TH.divider; c.lineWidth=1;
    c.beginPath(); c.moveTo(n.x+5,n.y+22); c.lineTo(n.x+NW-5,n.y+22); c.stroke();
    c.font = "9px Iowan Old Style, Palatino, Georgia, serif";
    def.ins.forEach((name,i)=>{
      const p = inPortPos(n,i);
      const fnPort = isFnIn(def,i);
      const pty = portType(def,i);
      const wired = wireInto(n.id,i);
      const col = !wired ? TH.portEmpty : fnPort ? TH.portFn : typeColor(pty);
      const shape = fnPort ? "sq" : pty==="v" ? "dm" : pty==="m" ? "sq" : pty==="d" ? "hx" : "";
      dot(c, p.x, p.y, col, shape);
      c.fillStyle=TH.label; c.textAlign="left";
      c.fillText(name, p.x+8, p.y);
    });
    if (!def.noOut){
      const p = outPortPos(n);
      const shape = oty==="v" ? "dm" : oty==="m" ? "sq" : oty==="d" ? "hx" : "";
      dot(c, p.x, p.y, TH.portOut, shape);
    }
    c.globalAlpha = 1;
  }
}
function plotColor(id){
  const n = nodeById(id); if(!n) return TH.plotCols[0];
  const cohort = nodes.filter(m=>m.type===n.type).map(m=>m.id).sort((a,b)=>a-b);
  return TH.plotCols[cohort.indexOf(id) % TH.plotCols.length];
}
function rr(c,x,y,w,h,r){ c.beginPath(); c.roundRect(x,y,w,h,r); }
function dot(c,x,y,col,shape){
  if (shape==="sq"){ c.fillStyle=col; c.fillRect(x-4,y-4,8,8);
    c.strokeStyle=TH.css.stage; c.lineWidth=1; c.strokeRect(x-4,y-4,8,8); return; }
  if (shape==="dm"){ c.beginPath();
    c.moveTo(x,y-5.4); c.lineTo(x+5.4,y); c.lineTo(x,y+5.4); c.lineTo(x-5.4,y);
    c.closePath(); c.fillStyle=col; c.fill();
    c.strokeStyle=TH.css.stage; c.lineWidth=1; c.stroke(); return; }
  if (shape==="hx"){ c.beginPath();
    for(let k=0;k<6;k++){ const a=Math.PI/6+k*Math.PI/3;
      const px=x+5*Math.cos(a), py=y+5*Math.sin(a);
      k?c.lineTo(px,py):c.moveTo(px,py); }
    c.closePath(); c.fillStyle=col; c.fill();
    c.strokeStyle=TH.css.stage; c.lineWidth=1; c.stroke(); return; }
  c.beginPath(); c.arc(x,y,4.4,0,7); c.fillStyle=col; c.fill();
  c.strokeStyle=TH.css.stage; c.lineWidth=1; c.stroke();
}
function drawWire(c,a,b,col,w,dash){
  c.strokeStyle=col; c.lineWidth=w; if(dash) c.setLineDash([5,4]);
  const k = Math.max(28, Math.abs(b.x-a.x)*0.5);
  c.beginPath(); c.moveTo(a.x,a.y);
  c.bezierCurveTo(a.x+k,a.y, b.x-k,b.y, b.x,b.y); c.stroke();
  c.setLineDash([]);
}

/* ---------------- plot view ---------------- */
let view = {x0:-3.4, x1:3.4, y0:-2.2, y1:2.2};
function xToPx(x){ return (x-view.x0)/(view.x1-view.x0)*PW; }
function yToPx(y){ return PH - (y-view.y0)/(view.y1-view.y0)*PH; }
function pxToX(px){ return view.x0 + px/PW*(view.x1-view.x0); }
function pxToY(py){ return view.y0 + (PH-py)/PH*(view.y1-view.y0); }
function niceStep(range, px, target){
  const raw = range/(px/target);
  const p = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const m of [1,2,5,10]) if (m*p >= raw) return m*p;
  return 10*p;
}
function drawPlot(){
  const c = pctx;
  c.setTransform(DPR,0,0,DPR,0,0);
  c.clearRect(0,0,PW,PH);
  c.fillStyle=TH.plotBg; c.fillRect(0,0,PW,PH);
  const sx = niceStep(view.x1-view.x0, PW, 62), sy = niceStep(view.y1-view.y0, PH, 52);
  c.strokeStyle=TH.gridLine; c.lineWidth=1;
  c.font="10px Iowan Old Style, Palatino, Georgia, serif";
  c.fillStyle=TH.tick;
  for(let x=Math.ceil(view.x0/sx)*sx; x<=view.x1; x+=sx){
    const px=xToPx(x); c.beginPath(); c.moveTo(px,0); c.lineTo(px,PH); c.stroke();
    if (Math.abs(x)>1e-9){ c.textAlign="center"; c.fillText(trim(x), px, yToPx(0)+11); }
  }
  for(let y=Math.ceil(view.y0/sy)*sy; y<=view.y1; y+=sy){
    const py=yToPx(y); c.beginPath(); c.moveTo(0,py); c.lineTo(PW,py); c.stroke();
    if (Math.abs(y)>1e-9){ c.textAlign="left"; c.fillText(trim(y), xToPx(0)+4, py-3); }
  }
  c.strokeStyle=TH.axis; c.lineWidth=1.5;
  c.beginPath(); c.moveTo(0,yToPx(0)); c.lineTo(PW,yToPx(0)); c.stroke();
  c.beginPath(); c.moveTo(xToPx(0),0); c.lineTo(xToPx(0),PH); c.stroke();

  const sel = nodeById(selId);
  const ghostOK = sel && !DEFS[sel.type].noOut && !DEFS[sel.type].isAnn;
  if (MODE==="la"){
    drawPlaneLA(c, sel, ghostOK);
  } else if (MODE==="train"){
    drawTrain(c, sel, ghostOK);
  } else if (MODE==="par"){
    if (ghostOK) traceDom(c, compile(selId), TH.ghost, 1.4, [5,4]);
    for(const p of nodes.filter(n=>n.type==="PLOT2"))
      trace2(c, compileInput(p.id,0), compileInput(p.id,1), plotColor(p.id), 2.2);
  } else {
    if (ghostOK) trace(c, compile(selId), TH.ghost, 1.4, [5,4]);
    for(const p of nodes.filter(n=>n.type==="PLOT"))
      trace(c, compile(p.id), plotColor(p.id), 2.2);
  }
}
function trim(v){ const s = v.toPrecision(3); return parseFloat(s).toString(); }
function trace(c, fn, col, w, dash){
  c.strokeStyle=col; c.lineWidth=w; if(dash) c.setLineDash(dash);
  const N = 420, yr = view.y1-view.y0;
  c.beginPath(); let pen=false, py=0;
  for(let i=0;i<=N;i++){
    const x = view.x0 + (view.x1-view.x0)*i/N;
    let y; try{ y = fn(x,t,0); }catch(e){ y = NaN; }
    if (!isFinite(y) || Math.abs(y-py)>yr*6 && pen){ pen=false; py=isFinite(y)?y:0;
      if(isFinite(y)){ c.moveTo(xToPx(x), yToPx(y)); pen=true; } continue; }
    const px=xToPx(x), pyy=yToPx(y);
    if(!pen){ c.moveTo(px,pyy); pen=true; } else c.lineTo(px,pyy);
    py=y;
  }
  c.stroke(); c.setLineDash([]);
}
function traceDom(c, fn, col, w, dash){
  c.strokeStyle=col; c.lineWidth=w; if(dash) c.setLineDash(dash);
  const N = 420, yr = view.y1-view.y0;
  c.beginPath(); let pen=false, py=0;
  for(let i=0;i<=N;i++){
    const u = tDom.a + (tDom.b-tDom.a)*i/N;
    let y; try{ y = fn(u,t,0); }catch(e){ y = NaN; }
    if (!isFinite(y) || Math.abs(y-py)>yr*6 && pen){ pen=false; py=isFinite(y)?y:0;
      if(isFinite(y)){ c.moveTo(xToPx(u), yToPx(y)); pen=true; } continue; }
    const px=xToPx(u), pyy=yToPx(y);
    if(!pen){ c.moveTo(px,pyy); pen=true; } else c.lineTo(px,pyy);
    py=y;
  }
  c.stroke(); c.setLineDash([]);
}
function trace2(c, fx, fy, col, w){
  c.strokeStyle=col; c.lineWidth=w;
  const N = 800;
  const xr = view.x1-view.x0, yr = view.y1-view.y0;
  c.beginPath(); let pen=false, pX=0, pY=0;
  for(let i=0;i<=N;i++){
    const u = tDom.a + (tDom.b-tDom.a)*i/N;
    let X, Y;
    try{ X = fx(u,t,0); Y = fy(u,t,0); }catch(e){ X = NaN; Y = NaN; }
    const bad = !isFinite(X) || !isFinite(Y);
    const jump = pen && (Math.abs(X-pX)>xr*0.5 || Math.abs(Y-pY)>yr*0.5);
    if (bad || jump){ pen=false;
      if(!bad){ c.moveTo(xToPx(X), yToPx(Y)); pen=true; pX=X; pY=Y; }
      continue; }
    const px=xToPx(X), py=yToPx(Y);
    if(!pen){ c.moveTo(px,py); pen=true; } else c.lineTo(px,py);
    pX=X; pY=Y;
  }
  c.stroke();
}

/* ---------------- linear algebra plane ---------------- */
function arrowPx(c, x0,y0, x1,y1, col, w, hollow, dash){
  if (Math.hypot(x1-x0,y1-y0) < 2) return;
  c.strokeStyle=col; c.fillStyle=col; c.lineWidth=w;
  if (dash) c.setLineDash([5,4]);
  c.beginPath(); c.moveTo(x0,y0); c.lineTo(x1,y1); c.stroke();
  c.setLineDash([]);
  const ang=Math.atan2(y1-y0,x1-x0), L=10, A=0.46;
  const ax=x1-L*Math.cos(ang-A), ay=y1-L*Math.sin(ang-A);
  const bx=x1-L*Math.cos(ang+A), by=y1-L*Math.sin(ang+A);
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(ax,ay); c.lineTo(bx,by); c.closePath();
  if (hollow){ c.lineWidth=1.6; if(dash)c.setLineDash([5,4]); c.stroke(); c.setLineDash([]); }
  else c.fill();
}
function drawLatticePx(c, m, col, alpha, dash){
  const G = 8;
  c.save();
  c.globalAlpha = alpha;
  c.strokeStyle = col; c.lineWidth = 1;
  if (dash) c.setLineDash([4,4]);
  for(let u=-G; u<=G; u++){
    let a=[m[0]*u+m[1]*(-G), m[2]*u+m[3]*(-G)];
    let b=[m[0]*u+m[1]*( G), m[2]*u+m[3]*( G)];
    c.beginPath(); c.moveTo(xToPx(a[0]),yToPx(a[1]));
    c.lineTo(xToPx(b[0]),yToPx(b[1])); c.stroke();
    a=[m[0]*(-G)+m[1]*u, m[2]*(-G)+m[3]*u];
    b=[m[0]*( G)+m[1]*u, m[2]*( G)+m[3]*u];
    c.beginPath(); c.moveTo(xToPx(a[0]),yToPx(a[1]));
    c.lineTo(xToPx(b[0]),yToPx(b[1])); c.stroke();
  }
  c.restore();
}
function drawMatPx(c, m, col, ghost, withHandles){
  if (!m.every(isFinite)) return;
  drawLatticePx(c, m, col, ghost?0.35:0.5, ghost);
  // unit square
  const P=[[0,0],[1,0],[1,1],[0,1]].map(q=>[m[0]*q[0]+m[1]*q[1], m[2]*q[0]+m[3]*q[1]]);
  c.save();
  c.globalAlpha = ghost?0.10:0.16; c.fillStyle=col;
  c.beginPath(); c.moveTo(xToPx(P[0][0]),yToPx(P[0][1]));
  for(let k=1;k<4;k++) c.lineTo(xToPx(P[k][0]),yToPx(P[k][1]));
  c.closePath(); c.fill();
  c.restore();
  // basis arrows: î = (m00,m10), ĵ = (m01,m11)
  const O=[xToPx(0),yToPx(0)];
  arrowPx(c, O[0],O[1], xToPx(m[0]),yToPx(m[2]), col, 3, false, ghost);
  arrowPx(c, O[0],O[1], xToPx(m[1]),yToPx(m[3]), col, 3, false, ghost);
  c.fillStyle=col; c.font="italic 11px Iowan Old Style, Palatino, Georgia, serif";
  c.textAlign="left"; c.textBaseline="bottom";
  c.fillText("î", xToPx(m[0])+5, yToPx(m[2])-4);
  c.fillText("ĵ", xToPx(m[1])+5, yToPx(m[3])-4);
  if (withHandles){
    for(const q of [[m[0],m[2]],[m[1],m[3]]]){
      c.beginPath(); c.arc(xToPx(q[0]),yToPx(q[1]),5,0,7);
      c.fillStyle=col; c.fill();
      c.strokeStyle=TH.plotBg; c.lineWidth=1.4; c.stroke();
    }
  }
}
function drawPlaneLA(c, sel, ghostOK){
  for(const dn of nodes.filter(n=>n.type==="DRAWM")){
    let m; try{ m = compileInput(dn.id,0)(0,t,0); }catch(e){ continue; }

  for(const dn of nodes.filter(n=>n.type==="DRAWV")){

}

      c.lineTo(xToPx(qx),yToPx(yy)); c.stroke();
    }
    c.globalAlpha=1;
    // train points: filled
    c.fillStyle=TH.axis;
    for(const [qx,qy] of dat){
      c.beginPath(); c.arc(xToPx(qx),yToPx(qy),3,0,7); c.fill();
    }
    // test points: hollow
    c.strokeStyle=TH.tick; c.lineWidth=1.4;

      c.beginPath(); c.arc(xToPx(qx),yToPx(qy),3.2,0,7); c.stroke();

    if (wireInto(f.id,0)) trace(c, fm, col, 2.2);

    if (selPt && selPt.fid===f.id){
      const src = selPt.which===1 ? dat : tst;
      if (selPt.i < src.length){
        const [qx,qy] = src[selPt.i];
        let yy=NaN; try{ yy=fm(qx,t,0); }catch(e){}
        if (isFinite(yy)){
          c.strokeStyle=TH.css.red; c.lineWidth=2;
          c.beginPath(); c.moveTo(xToPx(qx),yToPx(qy));
          c.lineTo(xToPx(qx),yToPx(yy)); c.stroke();
        }
        c.beginPath(); c.arc(xToPx(qx),yToPx(qy),6,0,7);
        c.strokeStyle=TH.css.red; c.lineWidth=2; c.stroke();
      }
    }
  }
}


/* ---------------- loss landscape (train) ---------------- */
function landscapeCtx(){
  const f = leadFit(); if (!f) return null;
  const ps = fitParams(f.id);
  if (ps.length<1 || ps.length>2) return {f, ps};
  syncPvals(); globalThis.__trainStep = trainStepCount;
  const fm = compileInput(f.id,0);
  let dat; try{ dat = compileInput(f.id,1)(0,t,0); }catch(e){ dat=[]; }
  if (!Array.isArray(dat) || !dat.length) return {f, ps};
  const kind = fLoss(f);
  const J = (vals)=>{
    const pv = globalThis.__pvals;
    const old = ps.map(p=>pv[p.id]);
    ps.forEach((p,i)=>pv[p.id]=vals[i]);
    let s=0;
    for(const [qx,qy] of dat){
      let p; try{ p = fm(qx,t,0); }catch(err){ s=NaN; break; }
      s += ptLoss(kind, p, qy);
    }
    ps.forEach((p,i)=>pv[p.id]=old[i]);
    return s/dat.length;
  };
  return {f, ps, J, dat, fm, kind};
}
let selPt = null;                     // {fid, which(1|2), i} tapped data point
function pointLoss(fitId, which, idx){
  syncPvals(); globalThis.__trainStep = trainStepCount;
  const kind = fLoss(nodeById(fitId));
  const fm = compileInput(fitId,0);
  let d; try{ d = compileInput(fitId,which)(0,t,0); }catch(e){ return null; }
  if (!Array.isArray(d) || idx>=d.length) return null;
  const [qx,qy] = d[idx];
  let yy; try{ yy = fm(qx,t,0); }catch(e){ return null; }
  if (!isFinite(yy)) return null;
  return {x:qx, y:qy, pred:yy, l:ptLoss(kind, yy, qy), kind};
}
function dataPointAt(sx, sy){
  if (MODE!=="train") return null;
  syncPvals(); globalThis.__trainStep = trainStepCount;
  for(const f of nodes.filter(n=>n.type==="FIT")){
    for(const which of [1,2]){
      let d; try{ d = compileInput(f.id,which)(0,t,0); }catch(e){ continue; }
      if (!Array.isArray(d)) continue;
      for(let i=0;i<d.length;i++){
        if (Math.hypot(xToPx(d[i][0])-sx, yToPx(d[i][1])-sy) < 9)
          return {fid:f.id, which, i};
      }
    }
  }
  return null;
}
function bestTestStep(){
  let bi=-1, bv=Infinity;
  lossHist.forEach((e,i)=>{ if (isFinite(e.T) && e.T<bv){ bv=e.T; bi=i; } });
  return bi;
}

/* ---------------- gradient glow (train) ---------------- */
let GLOW=false, glowMap=null, glowAt=0;
function compileEps(modelRootId, epsNodeId){
  let code = "";
  for(const nid of orderFrom(modelRootId)){
    const body = localExpr(nid);
    code += (nid===epsNodeId)
      ? `const n${nid} = (x,t,i)=>((${body}) + (globalThis.__weps||0));\n`
      : `const n${nid} = (x,t,i)=>(${body});\n`;
  }
  try { return new Function(PRE + code + `return n${modelRootId};`)(); }
  catch(e){ return ()=>NaN; }
}
function computeGlow(){
  glowMap = null;
  const f = leadFit(); if (!f) return;
  const w0 = wireInto(f.id,0); if (!w0) return;
  syncPvals(); globalThis.__trainStep = trainStepCount;
  let dat; try{ dat = compileInput(f.id,1)(0,t,0); }catch(e){ return; }
  if (!Array.isArray(dat) || !dat.length) return;
  const kind = fLoss(f);
  const ids = new Set();
  (function up(id){
    if (ids.has(id)) return; ids.add(id);
    for(const q of wires) if (q.to===id) up(q.from);
  })(w0.from);
  const h = 1e-3, res = new Map(); let mx = 0;
  for(const nid of ids){
    const fp = compileEps(w0.from, nid);
    const Jat = e=>{
      globalThis.__weps = e;
      let s=0;
      for(const [qx,qy] of dat){
        let p; try{ p = fp(qx,t,0); }catch(err){ s=NaN; break; }
        s += ptLoss(kind, p, qy);
      }
      globalThis.__weps = 0;
      return s/dat.length;
    };
    const g = (Jat(h)-Jat(-h))/(2*h);
    const a = Math.abs(g);
    if (isFinite(a)){ res.set(nid, a); if (a>mx) mx=a; }
  }
  glowMap = {res, mx};
}
function maybeGlow(){
  if (!GLOW || MODE!=="train") return;
  const now = Date.now();
  if (now-glowAt < 150) return;
  glowAt = now;
  computeGlow();
}
function drawMap(){
  mcSize(); if (!MW) return;
  const c = mctx;
  c.setTransform(DPR,0,0,DPR,0,0);
  c.clearRect(0,0,MW,MH);
  c.fillStyle=TH.plotBg; c.fillRect(0,0,MW,MH);
  const msg = s=>{ c.fillStyle=TH.tick;
    c.font="13px Iowan Old Style, Palatino, Georgia, serif";
    c.textAlign="center"; c.fillText(s, MW/2, MH/2); };
  const L = landscapeCtx();
  if (!L){ msg("add a fit node to see its loss landscape"); return; }
  if (!L.J){ msg(`landscape needs 1 or 2 params — this model has ${L.ps.length}`); return; }
  const {f, ps, J} = L;
  if (!lview) lview = defaultLview(ps.length);
  // axes / grid in parameter coordinates
  const gsx = niceStep(lview.x1-lview.x0, MW, 62), gsy = niceStep(lview.y1-lview.y0, MH, 52);
  c.strokeStyle=TH.gridLine; c.lineWidth=1;
  c.font="10px Iowan Old Style, Palatino, Georgia, serif";
  c.fillStyle=TH.tick;
  for(let x=Math.ceil(lview.x0/gsx)*gsx; x<=lview.x1; x+=gsx){
    const px=mX(x); c.beginPath(); c.moveTo(px,0); c.lineTo(px,MH); c.stroke();
    if (Math.abs(x)>1e-9){ c.textAlign="center"; c.fillText(trim(x), px, MH-4); }
  }
  for(let y=Math.ceil(lview.y0/gsy)*gsy; y<=lview.y1; y+=gsy){
    const py=mY(y); c.beginPath(); c.moveTo(0,py); c.lineTo(MW,py); c.stroke();
    if (Math.abs(y)>1e-9){ c.textAlign="left"; c.fillText(trim(y), 3, py-2); }
  }
  c.strokeStyle=TH.axis; c.lineWidth=1.2;
  if (lview.y0<0 && lview.y1>0){ c.beginPath(); c.moveTo(0,mY(0)); c.lineTo(MW,mY(0)); c.stroke(); }
  if (lview.x0<0 && lview.x1>0){ c.beginPath(); c.moveTo(mX(0),0); c.lineTo(mX(0),MH); c.stroke(); }
  const col = plotColor(f.id);
  if (ps.length===1){
    // one pass: every point's loss curve + their average
    const N=300, dat=L.dat, m=dat.length;
    const pv = globalThis.__pvals, oldv = pv[ps[0].id];
    const Jv = new Array(N+1);
    const Lv = dat.map(()=>new Array(N+1));
    for(let s=0;s<=N;s++){
      const w = lview.x0 + (lview.x1-lview.x0)*s/N;
      pv[ps[0].id] = w;
      let acc=0, bad=false;
      for(let i=0;i<m;i++){
        let pr; try{ pr = L.fm(dat[i][0],t,0); }catch(e){ bad=true; break; }
        const li = ptLoss(L.kind, pr, dat[i][1]);
        Lv[i][s]=li; acc+=li;
      }
      Jv[s] = bad ? NaN : acc/m;
    }
    pv[ps[0].id] = oldv;
    const wAt = s => lview.x0 + (lview.x1-lview.x0)*s/N;
    const poly = (arr, color, width, alpha)=>{
      c.strokeStyle=color; c.lineWidth=width; c.globalAlpha=alpha;
      c.beginPath(); let pen=false;
      for(let s=0;s<=N;s++){
        const v=arr[s];
        if (!isFinite(v)){ pen=false; continue; }
        const px=mX(wAt(s)), py=mY(v);
        pen ? c.lineTo(px,py) : (c.moveTo(px,py), pen=true);
      }
      c.stroke(); c.globalAlpha=1;
    };
    for(let i=0;i<m;i++) poly(Lv[i], TH.tick, 1, 0.07);         // the choir
    if (selPt && selPt.fid===f.id && selPt.which===1 && selPt.i<m)
      poly(Lv[selPt.i], TH.css.red, 1.6, 0.9);                   // your voter
    poly(Jv, col, 2.4, 1);                                       // their average
    const P=pathHist, stride=Math.max(1,Math.floor(P.length/120));
    c.fillStyle=TH.axis;
    for(let i=0;i<P.length;i+=stride){
      const w=P[i][0], Jp=J([w]);
      if (!isFinite(Jp)) continue;
      c.globalAlpha=0.2+0.55*i/Math.max(1,P.length-1);
      c.beginPath(); c.arc(mX(w),mY(Jp),2.2,0,7); c.fill();
    }
    c.globalAlpha=1;
    const w=ps[0].val, Jb=J([w]);
    if (isFinite(Jb)){
      c.beginPath(); c.arc(mX(w),mY(Jb),6,0,7);
      c.fillStyle=col; c.fill();
      c.strokeStyle=TH.plotBg; c.lineWidth=1.6; c.stroke();
    }
    c.fillStyle=TH.tick;
    c.font="11px Iowan Old Style, Palatino, Georgia, serif";
    c.textAlign="right";
    c.fillText("J(w) = mean of the faint ℒᵢ(w) · drag the ball", MW-8, 14);
  } else {
    const NX=56, NY=42, cw=MW/NX, ch=MH/NY;
    const vals=new Array(NX*NY);
    let lo=Infinity, hi=-Infinity;
    for(let iy=0;iy<NY;iy++) for(let ix=0;ix<NX;ix++){
      const w1 = lview.x0 + (ix+0.5)/NX*(lview.x1-lview.x0);
      const w2 = lview.y0 + (1-(iy+0.5)/NY)*(lview.y1-lview.y0);
      const Jv = J([w1,w2]);
      const lg = isFinite(Jv) ? Math.log10(Math.max(Jv,1e-9)) : NaN;
      vals[iy*NX+ix]=lg;
      if (isFinite(lg)){ if (lg<lo) lo=lg; if (lg>hi) hi=lg; }
    }
    if (!(hi>lo)){ lo=0; hi=1; }
    c.fillStyle=col;
    for(let iy=0;iy<NY;iy++) for(let ix=0;ix<NX;ix++){
      const lg=vals[iy*NX+ix]; if (!isFinite(lg)) continue;
      const norm=(lg-lo)/(hi-lo);
      const band=Math.floor((1-norm)*11)/11;      // valleys glow
      c.globalAlpha=0.05+0.5*band;
      c.fillRect(ix*cw, iy*ch, cw+0.5, ch+0.5);
    }
    c.globalAlpha=1;
    if (pathHist.length>1){
      c.strokeStyle=TH.axis; c.lineWidth=1.6;
      c.beginPath(); let pen=false;
      for(const p of pathHist){
        if (p.length<2){ pen=false; continue; }
        const px=mX(p[0]), py=mY(p[1]);
        pen ? c.lineTo(px,py) : (c.moveTo(px,py), pen=true);
      }
      c.stroke();
    }
    c.beginPath(); c.arc(mX(ps[0].val), mY(ps[1].val), 6, 0, 7);
    c.fillStyle=col; c.fill();
    c.strokeStyle=TH.plotBg; c.lineWidth=1.6; c.stroke();
    c.fillStyle=TH.tick;
    c.font="11px Iowan Old Style, Palatino, Georgia, serif";
    c.textAlign="right";
    c.fillText("J(w₁, w₂) · drag the ball", MW-8, 14);
  }
}
function landHandleAt(sx, sy){
  if (MODE!=="train" || !SHOW_LAND || !MW || !lview) return null;
  const L = landscapeCtx();
  if (!L || !L.J) return null;
  const ps = L.ps;
  let bx, by;
  if (ps.length===1){
    const Jv = L.J([ps[0].val]);
    if (!isFinite(Jv)) return null;
    bx = mX(ps[0].val); by = mY(Jv);
  } else {
    bx = mX(ps[0].val); by = mY(ps[1].val);
  }
  if (Math.hypot(bx-sx, by-sy) >= 18) return null;
  clearHist();
  return {set:(wx,wy)=>{
    ps[0].val = wx;
    if (ps.length===2) ps[1].val = wy;
    syncPvals();
  }};
}

function drawStrip(){
  lcSize(); if (!LW) return;
  const c = lctx;
  c.setTransform(DPR,0,0,DPR,0,0);
  c.clearRect(0,0,LW,LH);
  c.fillStyle=TH.plotBg; c.fillRect(0,0,LW,LH);
  c.font="10px Iowan Old Style, Palatino, Georgia, serif";
  if (!lossHist.length){
    c.fillStyle=TH.tick; c.textAlign="left";
    c.fillText("loss vs step · ▷ train to record", 8, 14);
    return;
  }
  let lo=Infinity, hi=-Infinity;
  for(const e of lossHist) for(const v of [e.L, e.T]){
    if (isFinite(v)){
      const l=Math.log10(Math.max(v,1e-12));
      if (l<lo) lo=l; if (l>hi) hi=l;
    }
  }
  if (!(hi>lo)) hi=lo+1;
  const pad=7, XW=LW-72;
  const yOf = l => pad + (hi-l)/(hi-lo)*(LH-2*pad);
  c.strokeStyle=TH.gridLine; c.lineWidth=1;
  c.fillStyle=TH.tick; c.textAlign="left";
  for(let d=Math.ceil(lo); d<=Math.floor(hi); d++){
    const y=yOf(d);
    c.beginPath(); c.moveTo(0,y); c.lineTo(XW,y); c.stroke();
    c.fillText("1e"+d, 3, y-2);
  }
  const f=leadFit();
  const col = f ? plotColor(f.id) : TH.plotCols[0];
  const N=lossHist.length;
  const line=(key,dash,color)=>{
    c.strokeStyle=color; c.lineWidth=1.6;
    if (dash) c.setLineDash([4,3]);
    c.beginPath(); let pen=false;
    for(let i=0;i<N;i++){
      const v=lossHist[i][key];
      if (!isFinite(v)){ pen=false; continue; }
      const x = N>1 ? i/(N-1)*XW : 0;
      const y = yOf(Math.log10(Math.max(v,1e-12)));
      pen ? c.lineTo(x,y) : (c.moveTo(x,y), pen=true);
    }
    c.stroke(); c.setLineDash([]);
  };
  line("L", false, col);
  const hasT = lossHist.some(e=>isFinite(e.T));
  if (hasT) line("T", true, TH.tick);
  if (hasT){
    const bi = bestTestStep();
    if (bi>=0){
      const bx = N>1 ? bi/(N-1)*XW : 0;
      const by = yOf(Math.log10(Math.max(lossHist[bi].T,1e-12)));
      c.fillStyle=TH.css.red;
      c.beginPath();
      c.moveTo(bx, by-9); c.lineTo(bx-4, by-16); c.lineTo(bx+4, by-16);
      c.closePath(); c.fill();
    }
  }
  const last=lossHist[N-1];
  c.textAlign="left";
  c.fillStyle=col;             c.fillText("J "+trim(last.L), XW+6, 14);
  if (isFinite(last.T)){ c.fillStyle=TH.tick; c.fillText("test J "+trim(last.T), XW+6, 28); }
  c.fillStyle=TH.tick;         c.fillText("step "+trainStepCount, XW+6, LH-6);
}

function constFeeding(nid, port){
  const w = wireInto(nid, port); if(!w) return null;
  const s = nodeById(w.from);
  return (s && s.type==="CONST") ? s : null;
}
function vecHandle(drawId){
  const w = wireInto(drawId,0); if(!w) return null;
  const src = nodeById(w.from);
  if (src.type==="VEC"){
    const cx=constFeeding(src.id,0), cy=constFeeding(src.id,1);
    if (cx&&cy) return {kind:"vec", cx, cy};
  } else if (src.type==="POLAR"){
    const cr=constFeeding(src.id,0), cth=constFeeding(src.id,1);
    if (cr&&cth) return {kind:"polar", cr, cth};
  }
  return null;
}
function matHandles(drawId){
  const w = wireInto(drawId,0); if(!w) return null;
  const src = nodeById(w.from);
  if (src.type!=="MAT") return null;
  const cs=[0,1,2,3].map(i=>constFeeding(src.id,i));
  if (cs.every(Boolean)) return {ix:cs[0],iy:cs[1],jx:cs[2],jy:cs[3]};
  return null;
}
function planeHandleAt(sx, sy){
  if (MODE!=="la") return null;
  const R = 16;
  for(const dn of nodes.filter(n=>n.type==="DRAWM")){
    const hs = matHandles(dn.id); if(!hs) continue;
    let m; try{ m = compileInput(dn.id,0)(0,t,0); }catch(e){ continue; }
    if (Math.hypot(xToPx(m[0])-sx, yToPx(m[2])-sy) < R)
      return {set:(wx,wy)=>{ hs.ix.val=wx; hs.iy.val=wy; }};
    if (Math.hypot(xToPx(m[1])-sx, yToPx(m[3])-sy) < R)
      return {set:(wx,wy)=>{ hs.jx.val=wx; hs.jy.val=wy; }};
  }
  for(const dn of nodes.filter(n=>n.type==="DRAWV")){
    const h = vecHandle(dn.id); if(!h) continue;
    let v, at;
    try{ v = compileInput(dn.id,0)(0,t,0); at = compileInput(dn.id,1)(0,t,0); }
    catch(e){ continue; }
    if (Math.hypot(xToPx(at[0]+v[0])-sx, yToPx(at[1]+v[1])-sy) < R){
      const id = dn.id;
      return {set:(wx,wy)=>{
        let a; try{ a = compileInput(id,1)(0,t,0); }catch(e){ a=[0,0]; }
        const rx = wx-a[0], ry = wy-a[1];
        if (h.kind==="vec"){ h.cx.val=rx; h.cy.val=ry; }
        else { h.cr.val=Math.hypot(rx,ry); h.cth.val=Math.atan2(ry,rx); }
      }};
    }
  }
  return null;
}
let hdrag = null;

/* ---------------- trainer ---------------- */
let trainStepCount = 0;
let lossHist = [];      // per step {L, T} for the lead fit
let pathHist = [];      // per step [p1, p2?] for the lead fit
let LOSS_CAP = 4000;
let SHOW_LAND = false;
function ptLoss(kind, pred, y){
  if (kind==="xent"){
    const p = Math.min(1-1e-7, Math.max(1e-7, pred));
    return -(y*Math.log(p) + (1-y)*Math.log(1-p));
  }
  const e = pred-y; return e*e;
}
function fLoss(f){ return f.loss==="xent" ? "xent" : "mse"; }
function clearHist(){
  lossHist=[]; pathHist=[];
  for(const n of nodes) if (n.type==="FIT") delete n.__opt;
}
function leadFit(){ return nodes.find(n=>n.type==="FIT"); }
function lossAtParams(fitId, vals){
  const ps = fitParams(fitId);
  syncPvals(); globalThis.__trainStep = trainStepCount;
  const kind = fLoss(nodeById(fitId));
  const fm = compileInput(fitId,0);
  let dat; try{ dat = compileInput(fitId,1)(0,t,0); }catch(e){ return NaN; }
  if (!Array.isArray(dat) || !dat.length) return NaN;
  const pv = globalThis.__pvals, old = ps.map(p=>pv[p.id]);
  ps.forEach((p,i)=>{ if (vals && vals[i]!==undefined) pv[p.id]=vals[i]; });
  let s=0;
  for(const [qx,qy] of dat){
    let p; try{ p = fm(qx,t,0); }catch(err){ s=NaN; break; }
    s += ptLoss(kind, p, qy);
  }
  ps.forEach((p,i)=>pv[p.id]=old[i]);
  return s/dat.length;
}
function syncPvals(){
  const pv = {};
  for(const n of nodes) if (n.type==="PARAM") pv[n.id]=n.val;
  globalThis.__pvals = pv;
}
function fitParams(fitId){
  const w = wireInto(fitId,0); if(!w) return [];
  const ids = new Set();
  (function up(id){
    if (ids.has(id)) return; ids.add(id);
    for(const q of wires) if (q.to===id) up(q.from);
  })(w.from);
  return nodes.filter(n=>n.type==="PARAM" && ids.has(n.id));
}
function fitLossOf(fitId, port){       // port 1 = data, 2 = test
  syncPvals();
  globalThis.__trainStep = trainStepCount;
  const kind = fLoss(nodeById(fitId));
  const fm = compileInput(fitId,0);
  let d; try{ d = compileInput(fitId,port)(0,t,0); }catch(e){ return NaN; }
  if (!Array.isArray(d) || !d.length) return NaN;
  let s=0;
  for(const [qx,qy] of d){
    let p; try{ p = fm(qx,t,0); }catch(err){ return NaN; }
    s += ptLoss(kind, p, qy);
  }
  return s/d.length;
}
function trainStep(){
  globalThis.__trainStep = trainStepCount;
  syncPvals();
  const pv = globalThis.__pvals;
  for(const f of nodes.filter(n=>n.type==="FIT")){
    const ps = fitParams(f.id); if(!ps.length) continue;
    const alpha = (f.alpha!==undefined) ? f.alpha : 0.1;
    const kind = fLoss(f);
    const fm = compileInput(f.id,0);
    let dat; try{ dat = compileInput(f.id,1)(0,t,0); }catch(e){ continue; }
    if (!Array.isArray(dat) || !dat.length) continue;
    const lossAt = ()=>{
      let s=0;
      for(const [qx,qy] of dat) s += ptLoss(kind, fm(qx,t,0), qy);
      return s/dat.length;
    };
    const g = [];
    for(const p of ps){
      const v = pv[p.id];
      const h = 1e-4*Math.max(1, Math.abs(v));
      pv[p.id]=v+h; const L1=lossAt();
      pv[p.id]=v-h; const L0=lossAt();
      pv[p.id]=v;
      g.push((L1-L0)/(2*h));
    }
    const opt = f.opt==="momentum" ? "momentum" : f.opt==="adam" ? "adam" : "sgd";
    if (!f.__opt) f.__opt = {v:{}, m:{}, s:{}, t:0};
    const st = f.__opt; st.t++;
    ps.forEach((p,ix)=>{
      const g0 = g[ix]; let d;
      if (opt==="momentum"){
        st.v[p.id] = 0.9*(st.v[p.id]||0) + g0;
        d = alpha*st.v[p.id];
      } else if (opt==="adam"){
        st.m[p.id] = 0.9*(st.m[p.id]||0) + 0.1*g0;
        st.s[p.id] = 0.999*(st.s[p.id]||0) + 0.001*g0*g0;
        const mh = st.m[p.id]/(1-Math.pow(0.9,st.t));
        const vh = st.s[p.id]/(1-Math.pow(0.999,st.t));
        d = alpha*mh/(Math.sqrt(vh)+1e-8);
      } else {
        d = alpha*g0;
      }
      const nv = p.val - d;
      if (isFinite(nv)) p.val = nv;
    });
    if (f===leadFit()){
      ps.forEach(p=>{ pv[p.id]=p.val; });
      let Lrec; try{ Lrec = lossAt(); }catch(e){ Lrec = NaN; }
      let Trec = NaN;
      if (wireInto(f.id,2)){
        try{
          const td = compileInput(f.id,2)(0,t,0);
          if (Array.isArray(td) && td.length){
            let s=0;
            for(const [qx,qy] of td) s += ptLoss(kind, fm(qx,t,0), qy);
            Trec = s/td.length;
          }
        }catch(e){}
      }
      lossHist.push({L:Lrec, T:Trec});
      pathHist.push(ps.map(p=>p.val));
      if (lossHist.length>LOSS_CAP){
        lossHist = lossHist.filter((_,i)=>i%2===0);
        pathHist = pathHist.filter((_,i)=>i%2===0);
      }
    }
  }
  trainStepCount++;
  syncPvals();
}
function resetParams(){
  beginAction();
  for(const n of nodes) if (n.type==="PARAM")
    n.val = Math.round((Math.random()*4-2)*100)/100;
  endAction();
  trainStepCount = 0;
  globalThis.__trainStep = 0;
  clearHist();
  updateInspector(); drawAll();
}

const exprEl = document.getElementById("expr");
function activeDefaultOutput(){
  if (MODE==="la") return nodes.find(n=>n.type==="DRAWV"||n.type==="DRAWM");
  if (MODE==="train") return nodes.find(n=>n.type==="FIT");
  const ty = MODE==="par" ? "PLOT2" : "PLOT";
  return nodes.find(n=>n.type===ty);
}
function updateExpr(){
  const sel = nodeById(selId);
  const useSel = sel && !DEFS[sel.type].isAnn;
  const nd = useSel ? sel : activeDefaultOutput();
  if (!nd){ exprEl.innerHTML=""; return; }
  const id = nd.id;
  const who = useSel ? (DEFS[sel.type].label + " node") : "plot 1";
  const lhs = nd.type==="PLOT2" ? "(x, y) = "
            : nd.type==="DRAWV" ? "v = "
            : nd.type==="DRAWM" ? "M = "
            : nd.type==="FIT"   ? "model · y = "
            : "y = ";
  let suffix = "";
  if (MODE==="train"){
    try{
      if (nd.type==="FIT"){
        const L = fitLossOf(id,1);
        if (isFinite(L)) suffix = `  ·  J = ${trim(L)}`;
        if (wireInto(id,2)){
          const Lt = fitLossOf(id,2);
          if (isFinite(Lt)) suffix += `  ·  test J ${trim(Lt)}`;
        }
        suffix += `  ·  step ${trainStepCount}`;
        if (selPt && selPt.fid===id){
          const pl = pointLoss(selPt.fid, selPt.which, selPt.i);
          if (pl) suffix += pl.kind==="xent"
            ? `  ·  ℒ = xent(ŷ=${trim(pl.pred)}, y=${trim(pl.y)}) = ${trim(pl.l)}`
            : `  ·  ℒ = (${trim(pl.pred)} − ${trim(pl.y)})² = ${trim(pl.l)}`;
        }
      } else if (outTypeOf(DEFS[nd.type])==="d"){
        syncPvals(); globalThis.__trainStep = trainStepCount;
        const pts = compile(id)(0,t,0);
        if (Array.isArray(pts)) suffix = `  ·  ${pts.length} pts`;
      }
    }catch(e){}
  }
  if (MODE==="la"){
    try{
      const def = DEFS[nd.type];
      if (nd.type==="DRAWV"){
        const v = compileInput(id,0)(0,t,0);
        suffix = `  =  (${trim(v[0])}, ${trim(v[1])})`;
      } else if (nd.type==="DRAWM"){
        const m = compileInput(id,0)(0,t,0);
        suffix = `  ·  det = ${trim(m[0]*m[3]-m[1]*m[2])}`;
      } else if (outTypeOf(def)==="s"){
        suffix = `  =  ${trim(compile(id)(0,t,0))}`;
      } else if (outTypeOf(def)==="v"){
        const v = compile(id)(0,t,0);
        suffix = `  =  (${trim(v[0])}, ${trim(v[1])})`;
      } else if (outTypeOf(def)==="m"){
        const m = compile(id)(0,t,0);
        suffix = `  ·  det = ${trim(m[0]*m[3]-m[1]*m[2])}`;
      }
    }catch(e){}
  }
  exprEl.innerHTML = `<span class="who">${who} · ${lhs}</span>${prettyOf(id)}${suffix}`;
}
