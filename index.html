/* ---------------- pointer interaction: graph ---------------- */
let drag = {kind:null};
const gptrs = new Map();
function gpos(e){ const r=gc.getBoundingClientRect();
  return {x:(e.clientX-r.left-gpan.x)/gscale, y:(e.clientY-r.top-gpan.y)/gscale}; }
function hitPort(p, want, wtype){
  const R = 18/gscale; let best=null, bd=R*R;
  for(const n of nodes){
    const def = DEFS[n.type];
    if (def.isAnn) continue;
    if (!def.noOut && want!=="in"){
      if (!wtype || outTypeOf(def)===wtype){
        const o=outPortPos(n);
        const d=(p.x-o.x)**2+(p.y-o.y)**2;
        if (d<bd){ bd=d; best={node:n.id, out:true, d2:d}; } } }
    if (want!=="out")
      for(let i=0;i<def.ins.length;i++){
        const need = isFnIn(def,i) ? "s" : portType(def,i);
        if (wtype && need!==wtype) continue;
        const q=inPortPos(n,i);
        const d=(p.x-q.x)**2+(p.y-q.y)**2;
        if (d<bd){ bd=d; best={node:n.id, out:false, port:i, d2:d}; } }
  }
  return best;
}
function hitNode(p){
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i];
    if (n.type==="FRAME") continue;
    if (p.x>=n.x && p.x<=n.x+nodeW(n) && p.y>=n.y && p.y<=n.y+nodeH(n)) return n; }
  return null;
}
function hitFrame(p){
  for(let i=nodes.length-1;i>=0;i--){ const n=nodes[i];
    if (n.type!=="FRAME") continue;
    const hR = 14/gscale;
    if (Math.abs(p.x-(n.x+n.w))<hR && Math.abs(p.y-(n.y+n.h))<hR)
      return {n, zone:"resize"};
    if (p.x>=n.x && p.x<=n.x+n.w && p.y>=n.y && p.y<=n.y+24)
      return {n, zone:"title"};
  }
  return null;
}
gc.addEventListener("pointerdown", e=>{
  gc.setPointerCapture(e.pointerId);
  closeCtx(); closeFinder(); closeDrops();
  gptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if (gptrs.size===2){ drag={kind:"gpinch"}; drawGraph(); return; }
  const p = gpos(e);
  glast = p;
  const port = hitPort(p);
  const n = hitNode(p);
  let useWire = false;
  if (port){
    if (!n) useWire = true;
    else {
      const inTitle = n.type!=="COMMENT" && p.y < n.y+22;
      useWire = !inTitle && port.d2 < (10/gscale)**2;
    }
  }
  if (useWire){
    beginAction();
    if (port.out){
      const wtype = outTypeOf(DEFS[nodeById(port.node).type]);
      drag={kind:"wire", fromOut:true, node:port.node, wtype, mx:p.x,my:p.y};
    } else {
      const w = wireInto(port.node, port.port);
      if (w){ wires = wires.filter(q=>q!==w);
        const wtype = outTypeOf(DEFS[nodeById(w.from).type]);
        drag={kind:"wire", fromOut:true, node:w.from, wtype, mx:p.x,my:p.y};
      } else {
        const td = DEFS[nodeById(port.node).type];
        const wtype = isFnIn(td,port.port) ? "s" : portType(td,port.port);
        drag={kind:"wire", fromOut:false, node:port.node, port:port.port, wtype, mx:p.x,my:p.y};
      }
    }
  } else if (n){
    beginAction();
    drag={kind:"node", node:n.id, dx:p.x-n.x, dy:p.y-n.y, sx:p.x, sy:p.y, moved:false};
  } else {
    const fh = hitFrame(p);
    if (fh && fh.zone==="resize"){
      beginAction();
      drag={kind:"fresize", node:fh.n.id,
            ow:fh.n.w-(p.x-fh.n.x), oh:fh.n.h-(p.y-fh.n.y)};
    } else if (fh){
      beginAction();
      const f = fh.n;
      const members = nodes.filter(m=>m.id!==f.id && m.type!=="FRAME" && insideFrame(m,f));
      drag={kind:"frame", node:f.id, sx:p.x, sy:p.y, moved:false,
            start:new Map([[f.id,{x:f.x,y:f.y}],
                           ...members.map(m=>[m.id,{x:m.x,y:m.y}])])};
    } else {
      drag={kind:"pan", sx:e.clientX-gpan.x, sy:e.clientY-gpan.y,
            moved:false, px:e.clientX, py:e.clientY};
    }
  }
  drawAll();
});
gc.addEventListener("pointermove", e=>{
  if (!drag.kind) return;
  if (drag.kind==="gpinch"){
    if (!gptrs.has(e.pointerId)) return;
    const ids=[...gptrs.keys()], a0=gptrs.get(ids[0]), b0=gptrs.get(ids[1]);
    const cur={x:e.clientX,y:e.clientY};
    const a1 = e.pointerId===ids[0]?cur:a0, b1 = e.pointerId===ids[1]?cur:b0;
    const d0=Math.hypot(a0.x-b0.x,a0.y-b0.y), d1=Math.hypot(a1.x-b1.x,a1.y-b1.y);
    const r = gc.getBoundingClientRect();
    const m0={x:(a0.x+b0.x)/2-r.left, y:(a0.y+b0.y)/2-r.top};
    const m1={x:(a1.x+b1.x)/2-r.left, y:(a1.y+b1.y)/2-r.top};
    gpan.x += m1.x-m0.x; gpan.y += m1.y-m0.y;
    if (d0>10 && d1>10){
      const ns = Math.min(2.5, Math.max(0.35, gscale*d1/d0));
      gpan.x = m1.x-(m1.x-gpan.x)*(ns/gscale);
      gpan.y = m1.y-(m1.y-gpan.y)*(ns/gscale);
      gscale = ns;
    }
    gptrs.set(e.pointerId,cur);
    drawGraph(); return;
  }
  gptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  const p = gpos(e);
  if (drag.kind==="wire"){ drag.mx=p.x; drag.my=p.y;
    drag.hover = hitPort(p, drag.fromOut ? "in" : "out", drag.wtype);
    drawGraph(); }
  else if (drag.kind==="node"){
    const n=nodeById(drag.node);
    if (Math.hypot(p.x-drag.sx,p.y-drag.sy)>4) drag.moved=true;
    if (drag.moved){ n.x=p.x-drag.dx; n.y=p.y-drag.dy; drawGraph(); }
  }
  else if (drag.kind==="frame"){
    if (Math.hypot(p.x-drag.sx,p.y-drag.sy)>4) drag.moved=true;
    if (drag.moved){
      const dx=p.x-drag.sx, dy=p.y-drag.sy;
      for(const [id,pos] of drag.start){
        const m=nodeById(id); if(m){ m.x=pos.x+dx; m.y=pos.y+dy; } }
      drawGraph();
    }
  }
  else if (drag.kind==="fresize"){
    const f=nodeById(drag.node);
    if (f){ f.w=Math.max(90, p.x-f.x+drag.ow);
            f.h=Math.max(60, p.y-f.y+drag.oh); drawGraph(); }
  }
  else if (drag.kind==="pan"){
    if (Math.hypot(e.clientX-drag.px,e.clientY-drag.py)>4) drag.moved=true;
    if (drag.moved){ gpan.x=e.clientX-drag.sx; gpan.y=e.clientY-drag.sy; drawGraph(); }
  }
});
gc.addEventListener("pointerup", e=>{
  gptrs.delete(e.pointerId);
  if (drag.kind==="gpinch"){
    if (gptrs.size<2) drag={kind:null};
    return;
  }
  const p = gpos(e);
  if (drag.kind==="wire"){
    const port = hitPort(p, drag.fromOut ? "in" : "out", drag.wtype);
    if (port){
      if (drag.fromOut && !port.out) connect(drag.node, port.node, port.port);
      else if (!drag.fromOut && port.out) connect(port.node, drag.node, drag.port);
    }
    endAction();
  } else if (drag.kind==="node"){
    if (!drag.moved){ selId = (selId===drag.node) ? -1 : drag.node; selWire=null; }
    endAction();
  } else if (drag.kind==="frame"){
    if (!drag.moved){ selId = (selId===drag.node) ? -1 : drag.node; selWire=null; }
    endAction();
  } else if (drag.kind==="fresize"){
    endAction();
  } else if (drag.kind==="pan" && !drag.moved){
    const w = wireAt(p);
    if (w){ selWire = (selWire===w) ? null : w; selId = -1; }
    else { selId = -1; selWire = null; }
  }
  drag={kind:null};
  updateInspector(); drawAll();
});
gc.addEventListener("pointercancel", e=>{
  gptrs.delete(e.pointerId);
  if (gptrs.size<2 && drag.kind==="gpinch") drag={kind:null};
});
gc.addEventListener("wheel", e=>{ e.preventDefault();
  const f = e.deltaY>0 ? 1/1.12 : 1.12;
  const ns = Math.min(2.5, Math.max(0.35, gscale*f));
  const r = gc.getBoundingClientRect();
  const cx=e.clientX-r.left, cy=e.clientY-r.top;
  gpan.x = cx-(cx-gpan.x)*(ns/gscale);
  gpan.y = cy-(cy-gpan.y)*(ns/gscale);
  gscale = ns;
  drawGraph();
},{passive:false});

/* ---------------- pointer interaction: plot ---------------- */
const ptrs = new Map();
pc.addEventListener("pointerdown", e=>{
  pc.setPointerCapture(e.pointerId);
  const r = pc.getBoundingClientRect();
  const sx = e.clientX-r.left, sy = e.clientY-r.top;
  const h = planeHandleAt(sx, sy);
  if (h){ hdrag = {h, pid:e.pointerId}; beginAction(); return; }
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY,moved:false});
});
pc.addEventListener("pointermove", e=>{
  if (hdrag && e.pointerId===hdrag.pid){
    const r = pc.getBoundingClientRect();
    const wx = pxToX(e.clientX-r.left), wy = pxToY(e.clientY-r.top);
    hdrag.h.set(wx, wy);
    drawAll();
    return;
  }
  if (!ptrs.has(e.pointerId)) return;
  const prev = ptrs.get(e.pointerId);
  const cur = {x:e.clientX,y:e.clientY,sx:prev.sx,sy:prev.sy,
               moved:prev.moved || Math.hypot(e.clientX-prev.sx,e.clientY-prev.sy)>4};
  if (ptrs.size===1){
    const dx = (cur.x-prev.x)/PW*(view.x1-view.x0);
    const dy = (cur.y-prev.y)/PH*(view.y1-view.y0);
    view.x0-=dx; view.x1-=dx; view.y0+=dy; view.y1+=dy;
  } else if (ptrs.size===2){
    const ids=[...ptrs.keys()], a0=ptrs.get(ids[0]), b0=ptrs.get(ids[1]);
    const a1 = e.pointerId===ids[0]?cur:a0, b1 = e.pointerId===ids[1]?cur:b0;
    const d0=Math.hypot(a0.x-b0.x,a0.y-b0.y), d1=Math.hypot(a1.x-b1.x,a1.y-b1.y);
    if (d0>10 && d1>10){
      const s = d0/d1;
      const r = pc.getBoundingClientRect();
      const mx = view.x0 + ((a1.x+b1.x)/2 - r.left)/PW*(view.x1-view.x0);
      const my = view.y0 + (PH-((a1.y+b1.y)/2 - r.top))/PH*(view.y1-view.y0);
      view.x0 = mx + (view.x0-mx)*s; view.x1 = mx + (view.x1-mx)*s;
      view.y0 = my + (view.y0-my)*s; view.y1 = my + (view.y1-my)*s;
    }
  }
  ptrs.set(e.pointerId,cur);
  drawPlot();
});
function ptrEnd(e){
  if (hdrag && e.pointerId===hdrag.pid){
    hdrag=null; endAction(); updateInspector(); drawAll(); return;
  }
  const entry = ptrs.get(e.pointerId);
  ptrs.delete(e.pointerId);
  if (entry && !entry.moved && MODE==="train" && ptrs.size===0){
    const r = pc.getBoundingClientRect();
    selPt = dataPointAt(e.clientX-r.left, e.clientY-r.top);
    drawPlot(); if (SHOW_LAND) drawMap(); updateExpr();
  }
}
pc.addEventListener("pointerup", ptrEnd); pc.addEventListener("pointercancel", ptrEnd);
pc.addEventListener("wheel", e=>{ e.preventDefault();
  const s = e.deltaY>0 ? 1.12 : 1/1.12;
  const r = pc.getBoundingClientRect();
  const mx = view.x0 + (e.clientX-r.left)/PW*(view.x1-view.x0);
  const my = view.y0 + (PH-(e.clientY-r.top))/PH*(view.y1-view.y0);
  view.x0=mx+(view.x0-mx)*s; view.x1=mx+(view.x1-mx)*s;
  view.y0=my+(view.y0-my)*s; view.y1=my+(view.y1-my)*s;
  drawPlot();
},{passive:false});

    : (MODE==="train" ? "▷ train" : "▷ play τ");

    requestAnimationFrame(tick);
  } else if (MODE==="train") endAction();
});
function tick(){
  if (!playing) return;
  if (MODE==="train"){
    spAcc += trainSPS/60;
    const k = Math.floor(spAcc);
    if (k){
      spAcc -= k;
      for(let q=0;q<Math.min(k,8);q++) trainStep();
      drawAll();
    }
  } else {
    t += 1/60; drawPlot(); updateExpr();
  }
  requestAnimationFrame(tick);
}

function loadPreset(p){
  const build = p.build || p;
  if (nodes.length) beginAction();
  nodes=[]; wires=[]; nextId=1; selId=-1; selWire=null; t=0;
  trainStepCount=0; globalThis.__trainStep=0; clearHist();
  SHOW_LAND = (p.mode==="train"); lview=null; selPt=null;
  if (p.mode==="par"){ tDom = p.dom ? {a:p.dom[0], b:p.dom[1]} : {a:0, b:6.2832}; }
  build();
  if (undoStack.length) endAction();
  setMode(p.mode || "1d", true);
  gpan={x:0,y:0}; gscale=1;
  if (p.view){ view = {...p.view}; if (MODE==="par"||MODE==="la") lockAspect(); }
  else if (MODE==="par"){ view={x0:-2.4,x1:2.4,y0:-2,y1:2}; lockAspect(); }
  else if (MODE==="la"){ view={x0:-3.2,x1:3.2,y0:-2.6,y1:2.6}; lockAspect(); }
  else view = {x0:-3.4, x1:3.4, y0:-2.2, y1:2.2};
  syncPvals();
  updateInspector(); drawAll();
}
function note(x,y,text){ const c=addNode("COMMENT",x,y); c.text=text; return c; }
function cvec(x,y,vx,vy){        // const-fed vec (tip-draggable)
  const cx=addNode("CONST",x,y,vx), cy=addNode("CONST",x,y+66,vy);
  const v=addNode("VEC",x+108,y+22);
  connect(cx.id,v.id,0); connect(cy.id,v.id,1);
  return v;
}
function cmat(x,y,a,b,c_,d){     // const-fed matrix (î/ĵ-draggable)
  const ci=addNode("CONST",x,y,a), cj=addNode("CONST",x,y+62,b);
  const ck=addNode("CONST",x,y+124,c_), cl=addNode("CONST",x,y+186,d);

  connect(ci.id,m.id,0); connect(cj.id,m.id,1);
  connect(ck.id,m.id,2); connect(cl.id,m.id,3);
  return m;
}

    const m=addNode("MUL",128,82), b=addNode("PARAM",128,152,0.9);
    const ad=addNode("ADD",240,104);
    const dg=addNode("DGLINE",240,210);
    const f=addNode("FIT",372,140); f.alpha=0.15;
    connect(w.id,m.id,0); connect(x.id,m.id,1);
    connect(m.id,ad.id,0); connect(b.id,ad.id,1);
    connect(ad.id,f.id,0); connect(dg.id,f.id,1);
  },
}],
["ix · optimizers", {
  "the canyon": ()=>{
    note(16,-102,"The model w·(x − 3) + b: shifting the inputs couples the two knobs, so ⛰ shows a long narrow canyon. Plain sgd zigzags between its walls — and explodes if α exceeds ≈0.08. Open the fit inspector: momentum averages the zigzag into a glide at the same α. adam normalizes every step, so raise α to 0.4 — a speed that would detonate sgd — and it takes the canyon like a highway. Switch, drag the ball back, train again.");
    const w=addNode("PARAM",16,60,-1.5), x=addNode("X",16,130);

};
function rebuildExamples(){
  dEx.innerHTML="";
  for(const [section, plates] of CURRICULA[MODE]){
    const h=document.createElement("div"); h.className="h"; h.textContent=section;
    dEx.appendChild(h);
    for(const [name, entry] of Object.entries(plates)){
      const b=document.createElement("button"); b.textContent=name;
      const p = {build:entry, dom:entry.dom, mode:MODE};
      b.addEventListener("click", ()=>{ closeDrops(); loadPreset(p); });
      dEx.appendChild(b);
    }
  }
}
const PRESETS = {};
for(const mode of Object.keys(CURRICULA))
  for(const [_,plates] of CURRICULA[mode])
    for(const [name,entry] of Object.entries(plates))
      PRESETS[name] = {build:entry, dom:entry.dom, mode};

/* ---------------- boot ---------------- */
function drawAll(){ syncPvals(); maybeGlow(); drawGraph(); drawPlot(); if (MODE==="train"){ drawStrip(); if (SHOW_LAND) drawMap(); } updateExpr(); }
setTheme("ink");
setMode("1d", true);
loadPreset(PRESETS["wave"]);
resize();
</script>
